<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2FA Code Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b14;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: #13131f;
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #1f1f2e;
            box-shadow: 0 12px 48px rgba(0,0,0,0.6);
            text-align: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .logo span { color: #a855f7; }
        .tagline {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }
        .secret-input-area {
            margin-bottom: 14px;
        }
        .secret-input-area input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #222;
            background: #0b0b14;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
            transition: border 0.2s;
        }
        .secret-input-area input:focus {
            outline: none;
            border-color: #a855f7;
        }
        .secret-input-area input::placeholder {
            color: #444;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.8rem;
        }
        .code-box {
            background: #0b0b14;
            border-radius: 14px;
            padding: 20px 16px 16px;
            margin-top: 4px;
            border: 1px solid #1a1a2a;
            display: none;
        }
        .code-box.show { display: block; }
        .code-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 8px;
        }
        .code-label .copy-btn,
        .mini-copy-btn {
            background: transparent;
            border: 1px solid #222;
            color: #888;
            padding: 3px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        .code-label .copy-btn:hover,
        .mini-copy-btn:hover {
            border-color: #a855f7;
            color: #a855f7;
        }
        .code-label .copy-btn.copied,
        .mini-copy-btn.copied {
            border-color: #22c55e;
            color: #22c55e;
        }
        .code-digits {
            font-family: 'Courier New', monospace;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 10px;
            color: #a855f7;
            padding: 4px 0 8px;
            word-break: break-all;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s, opacity 0.15s;
        }
        .code-digits:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .code-digits:active {
            transform: scale(0.98);
        }
        .copy-hint {
            font-size: 0.68rem;
            color: #444;
            margin-top: -4px;
            margin-bottom: 6px;
            min-height: 14px;
        }
        .copy-hint.active {
            color: #22c55e;
        }
        .secret-display {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #444;
            word-break: break-all;
            margin-top: 2px;
            padding: 4px 0;
        }
        .next-code {
            font-size: 0.8rem;
            color: #555;
            margin-top: 8px;
            min-height: 22px;
        }
        .next-code span { color: #888; font-weight: 600; }
        .progress-bar {
            height: 3px;
            background: #1a1a2a;
            border-radius: 2px;
            margin: 10px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #a855f7;
            width: 100%;
            transition: width 1s linear;
        }
        .alt-link-box {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #1a1a2a;
            border-radius: 10px;
            background: #10101a;
            text-align: left;
            display: none;
        }
        .alt-link-box.show { display: block; }
        .alt-title {
            color: #666;
            font-size: 0.72rem;
            margin-bottom: 6px;
        }
        .secret-link {
            display: block;
            color: #a855f7;
            font-family: 'Courier New', monospace;
            font-size: 0.68rem;
            line-height: 1.35;
            text-decoration: none;
            word-break: break-all;
            margin-bottom: 8px;
        }
        .secret-link:hover {
            text-decoration: underline;
        }
        .mini-copy-btn {
            width: 100%;
            padding: 7px 10px;
        }
        .links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .links a {
            display: block;
            padding: 11px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .links .home-btn {
            background: #1a1a2e;
            color: #ccc;
            border: 1px solid #222;
        }
        .links .home-btn:hover { background: #222; border-color: #444; }
        .links .wa-btn {
            background: #075e54;
            color: #fff;
        }
        .links .wa-btn:hover { background: #0a7a6b; }
        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
        .error-msg.show { display: block; }
        .footer {
            margin-top: 16px;
            font-size: 0.65rem;
            color: #333;
        }
        @media (max-width: 400px) {
            .card { padding: 24px 16px; }
            .code-digits { font-size: 2rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">BABAY<span>SHOP</span></div>
        <div class="tagline">2FA Code Generator</div>

        <div class="secret-input-area">
            <input type="text" id="secretInput" placeholder="Paste secret key here..." autocomplete="off" spellcheck="false">
        </div>

        <div class="error-msg" id="errorMsg">Invalid secret key</div>

        <div class="code-box" id="codeBox">
            <div class="code-label">
                <span>2FA Code :</span>
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
            <div class="code-digits" id="codeDisplay" title="Click to copy code">------</div>
            <div class="copy-hint" id="copyHint">Click code to copy</div>
            <div class="secret-display" id="secretDisplay"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="next-code" id="nextCodeDisplay">Next code in <span>30</span>s</div>

            <div class="alt-link-box" id="altLinkBox">
                <div class="alt-title">Alternative link with secret key:</div>
                <a href="#" class="secret-link" id="secretLink" target="_blank" rel="noopener noreferrer"></a>
                <button class="mini-copy-btn" id="copyLinkBtn">Copy Alternative Link</button>
            </div>
        </div>

        <div class="links">
            <a href="https://babayshop.my.id" class="home-btn" target="_blank">Homepage — Babayshop.my.id</a>
        </div>
        <div class="footer">Authorized tool</div>
    </div>

    <script>
        // Change this if your 2FA page URL is different
        const SHARE_BASE_URL = 'https://babay.web.id/2fa/';

        // ====== Clean secret ======
        function cleanSecret(raw) {
            // Ignores spaces, dashes, new lines, and other non-Base32 characters
            return String(raw || '').toUpperCase().replace(/[^A-Z2-7]/g, '');
        }

        // ====== Base32 → Bytes ======
        function base32ToBytes(b32) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            const cleaned = cleanSecret(b32);
            if (cleaned.length < 4) return null;

            let bits = '';
            for (const c of cleaned) {
                const val = alphabet.indexOf(c);
                if (val === -1) return null;
                bits += val.toString(2).padStart(5, '0');
            }

            const bytes = [];
            for (let i = 0; i + 7 < bits.length; i += 8) {
                bytes.push(parseInt(bits.substring(i, i + 8), 2));
            }
            return bytes;
        }

        // ====== TOTP RFC 6238 (Web Crypto) ======
        async function hmacSha1(key, msg) {
            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                new Uint8Array(key),
                { name: 'HMAC', hash: 'SHA-1' },
                false,
                ['sign']
            );
            return new Uint8Array(await crypto.subtle.sign('HMAC', cryptoKey, new Uint8Array(msg)));
        }

        function truncate(hs) {
            const offset = hs[hs.length - 1] & 0xf;
            return (
                ((hs[offset] & 0x7f) << 24) |
                (hs[offset + 1] << 16) |
                (hs[offset + 2] << 8) |
                hs[offset + 3]
            ) % 1000000;
        }

        async function totp(secretBytes, time = Math.floor(Date.now() / 1000)) {
            let cnt = Math.floor(time / 30);
            const msg = new Uint8Array(8);
            for (let i = 7; i >= 0; i--) {
                msg[i] = cnt & 0xff;
                cnt = Math.floor(cnt / 256);
            }
            return String(truncate(await hmacSha1(secretBytes, msg))).padStart(6, '0');
        }

        // ====== Predict next code ======
        async function nextTotp(secretBytes) {
            const t = Math.floor(Date.now() / 1000);
            const nextT = (Math.floor(t / 30) + 1) * 30;
            return {
                code: await totp(secretBytes, nextT),
                secondsUntil: nextT - t
            };
        }

        // ====== State ======
        let secretBytes = null;
        let secretStr = '';
        let intervalId = null;
        let debounceId = null;
        let lastStartedSecret = '';

        // ====== DOM refs ======
        const secretInput = document.getElementById('secretInput');
        const errorMsg = document.getElementById('errorMsg');
        const codeBox = document.getElementById('codeBox');
        const codeDisplay = document.getElementById('codeDisplay');
        const copyHint = document.getElementById('copyHint');
        const secretDisplay = document.getElementById('secretDisplay');
        const progressFill = document.getElementById('progressFill');
        const nextCodeDisplay = document.getElementById('nextCodeDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const altLinkBox = document.getElementById('altLinkBox');
        const secretLink = document.getElementById('secretLink');
        const copyLinkBtn = document.getElementById('copyLinkBtn');

        // ====== Clipboard helper ======
        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        function setCopyFeedback(message = 'Copied!') {
            copyBtn.textContent = message;
            copyBtn.classList.add('copied');
            copyHint.textContent = message;
            copyHint.classList.add('active');

            setTimeout(() => {
                copyBtn.textContent = 'Copy';
                copyBtn.classList.remove('copied');
                copyHint.textContent = 'Click code to copy';
                copyHint.classList.remove('active');
            }, 1300);
        }

        function buildAlternativeLink() {
            return SHARE_BASE_URL + '?key=' + encodeURIComponent(secretStr.toLowerCase());
        }

        function updateAlternativeLink() {
            const link = buildAlternativeLink();
            secretLink.href = link;
            secretLink.textContent = link;
            altLinkBox.classList.add('show');
        }

        function stopGeneration() {
            secretBytes = null;
            secretStr = '';
            lastStartedSecret = '';
            codeBox.classList.remove('show');
            altLinkBox.classList.remove('show');
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }

        // ====== Load secret from URL query ======
        function loadSecretFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('key');

            if (key && cleanSecret(key).length >= 8) {
                secretInput.value = key;
                return key;
            }
            return null;
        }

        // ====== Start generating ======
        async function startGeneration(rawSecret, options = {}) {
            const cleaned = cleanSecret(rawSecret);

            if (!cleaned) {
                errorMsg.classList.remove('show');
                stopGeneration();
                return false;
            }

            // Avoid flashing error while user is still typing very short input
            if (cleaned.length < 8) {
                if (!options.silent) {
                    errorMsg.textContent = 'Secret key masih terlalu pendek';
                    errorMsg.classList.add('show');
                } else {
                    errorMsg.classList.remove('show');
                }
                stopGeneration();
                return false;
            }

            const bytes = base32ToBytes(cleaned);
            if (!bytes || bytes.length < 6) {
                errorMsg.textContent = 'Invalid secret — enter a valid Base32 key';
                errorMsg.classList.add('show');
                stopGeneration();
                return false;
            }

            errorMsg.classList.remove('show');
            secretBytes = bytes;
            secretStr = cleaned;
            lastStartedSecret = cleaned;

            secretDisplay.textContent = 'Secret: ' + secretStr;
            codeBox.classList.add('show');
            updateAlternativeLink();

            await updateDisplay();

            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(updateDisplay, 1000);

            return true;
        }

        async function updateDisplay() {
            if (!secretBytes) return;

            const now = Math.floor(Date.now() / 1000);
            const elapsed = now % 30;
            const progress = (elapsed / 30) * 100;
            progressFill.style.width = (100 - progress) + '%';

            const currentCode = await totp(secretBytes, now);
            codeDisplay.textContent = currentCode;

            const next = await nextTotp(secretBytes);
            nextCodeDisplay.innerHTML = 'Next code (<span>' + next.code + '</span>) in <span>' + next.secondsUntil + '</span>s';
        }

        // ====== Auto-generate after paste/type ======
        secretInput.addEventListener('input', () => {
            clearTimeout(debounceId);

            debounceId = setTimeout(() => {
                const cleaned = cleanSecret(secretInput.value);

                if (!cleaned) {
                    errorMsg.classList.remove('show');
                    stopGeneration();
                    return;
                }

                if (cleaned === lastStartedSecret) return;

                startGeneration(cleaned, { silent: true });
            }, 250);
        });

        // ====== Enter key still works ======
        secretInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                startGeneration(secretInput.value, { silent: false });
            }
        });

        // ====== Copy 6 digit code by button ======
        copyBtn.addEventListener('click', async () => {
            const code = codeDisplay.textContent.trim();
            if (!/^\d{6}$/.test(code)) return;

            await copyText(code);
            setCopyFeedback('Copied!');
        });

        // ====== Copy 6 digit code by clicking the number ======
        codeDisplay.addEventListener('click', async () => {
            const code = codeDisplay.textContent.trim();
            if (!/^\d{6}$/.test(code)) return;

            await copyText(code);
            setCopyFeedback('Copied!');
        });

        // ====== Copy alternative link ======
        copyLinkBtn.addEventListener('click', async () => {
            if (!secretStr) return;

            await copyText(buildAlternativeLink());
            copyLinkBtn.textContent = 'Link Copied!';
            copyLinkBtn.classList.add('copied');

            setTimeout(() => {
                copyLinkBtn.textContent = 'Copy Alternative Link';
                copyLinkBtn.classList.remove('copied');
            }, 1300);
        });

        // ====== Init: auto-load from URL ======
        (async function init() {
            const querySecret = loadSecretFromQuery();
            if (querySecret) {
                await startGeneration(querySecret, { silent: false });
            }
        })();

        console.log('Babayshop 2FA Generator ready');
    </script>
</body>
</html>
