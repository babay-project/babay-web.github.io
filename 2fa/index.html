<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Babayshop 2FA Code Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b14;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .card {
            background: #13131f;
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #1f1f2e;
            box-shadow: 0 12px 48px rgba(0,0,0,0.6);
            text-align: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .logo span { color: #a855f7; }
        .tagline {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }
        .secret-input-area {
            margin-bottom: 20px;
        }
        .secret-input-area input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #222;
            background: #0b0b14;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
            transition: border 0.2s;
        }
        .secret-input-area input:focus {
            outline: none;
            border-color: #a855f7;
        }
        .secret-input-area input::placeholder {
            color: #444;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.8rem;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #a855f7;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }
        .btn:hover { background: #9333ea; transform: translateY(-1px); }
        .btn:active { transform: scale(0.97); }
        .code-box {
            background: #0b0b14;
            border-radius: 14px;
            padding: 20px 16px 16px;
            margin-top: 4px;
            border: 1px solid #1a1a2a;
            display: none;
        }
        .code-box.show { display: block; }
        .code-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 8px;
        }
        .code-label .copy-btn {
            background: transparent;
            border: 1px solid #222;
            color: #888;
            padding: 3px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        .code-label .copy-btn:hover { border-color: #a855f7; color: #a855f7; }
        .code-label .copy-btn.copied { border-color: #22c55e; color: #22c55e; }
        .code-digits {
            font-family: 'Courier New', monospace;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 10px;
            color: #a855f7;
            padding: 4px 0 8px;
            word-break: break-all;
        }
        .secret-display {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #444;
            word-break: break-all;
            margin-top: 2px;
            padding: 4px 0;
        }
        .next-code {
            font-size: 0.8rem;
            color: #555;
            margin-top: 8px;
            min-height: 22px;
        }
        .next-code span { color: #888; font-weight: 600; }
        .progress-bar {
            height: 3px;
            background: #1a1a2a;
            border-radius: 2px;
            margin: 10px 0 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #a855f7;
            width: 100%;
            transition: width 1s linear;
        }
        .links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .links a {
            display: block;
            padding: 11px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .links .home-btn {
            background: #1a1a2e;
            color: #ccc;
            border: 1px solid #222;
        }
        .links .home-btn:hover { background: #222; border-color: #444; }
        .links .wa-btn {
            background: #075e54;
            color: #fff;
        }
        .links .wa-btn:hover { background: #0a7a6b; }
        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
        .error-msg.show { display: block; }
        .footer {
            margin-top: 16px;
            font-size: 0.65rem;
            color: #333;
        }
        @media (max-width: 400px) {
            .card { padding: 24px 16px; }
            .code-digits { font-size: 2rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">BABAY<span>SHOP</span></div>
        <div class="tagline">2FA Code Generator</div>

        <div class="secret-input-area">
            <input type="text" id="secretInput" placeholder="Paste secret key here..." autocomplete="off" spellcheck="false">
        </div>

        <button class="btn" id="generateBtn">Generate Code</button>
        <div class="error-msg" id="errorMsg">Invalid secret key</div>

        <div class="code-box" id="codeBox">
            <div class="code-label">
                <span>Current Code</span>
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
            <div class="code-digits" id="codeDisplay">------</div>
            <div class="secret-display" id="secretDisplay"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="next-code" id="nextCodeDisplay">Next code in <span>30</span>s</div>
        </div>

        <div class="links">
            <a href="https://babayshop.my.id" class="home-btn" target="_blank">Homepage — Babayshop.my.id</a>
            <a href="https://wa.me/6281523984574" class="wa-btn" target="_blank">WhatsApp 081523984574</a>
        </div>
        <div class="footer">Authorized pentesting tool</div>
    </div>

    <script>
        // ====== Base32 → Bytes ======
        function base32ToBytes(b32) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let cleaned = b32.toUpperCase().replace(/[^A-Z2-7]/g, '');
            if (cleaned.length < 4) return null;
            let bits = '';
            for (let c of cleaned) {
                let val = alphabet.indexOf(c);
                if (val === -1) continue;
                bits += val.toString(2).padStart(5, '0');
            }
            const bytes = [];
            for (let i = 0; i + 7 < bits.length; i += 8)
                bytes.push(parseInt(bits.substr(i, 8), 2));
            return bytes;
        }

        // ====== TOTP RFC 6238 (Web Crypto) ======
        async function hmacSha1(key, msg) {
            const cryptoKey = await crypto.subtle.importKey('raw', new Uint8Array(key), { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
            return new Uint8Array(await crypto.subtle.sign('HMAC', cryptoKey, new Uint8Array(msg)));
        }

        function truncate(hs) {
            const offset = hs[hs.length - 1] & 0xf;
            return ((hs[offset] & 0x7f) << 24 | hs[offset + 1] << 16 | hs[offset + 2] << 8 | hs[offset + 3]) % 1000000;
        }

        async function totp(secretBytes, time = Math.floor(Date.now() / 1000)) {
            let cnt = Math.floor(time / 30);
            const msg = new Uint8Array(8);
            for (let i = 7; i >= 0; i--) { msg[i] = cnt & 0xff; cnt >>>= 8; }
            return String(truncate(await hmacSha1(secretBytes, msg))).padStart(6, '0');
        }

        // ====== Predict next code ======
        async function nextTotp(secretBytes) {
            let t = Math.floor(Date.now() / 1000);
            let nextT = (Math.floor(t / 30) + 1) * 30;
            return { code: await totp(secretBytes, nextT), secondsUntil: nextT - t };
        }

        // ====== State ======
        let secretBytes = null;
        let secretStr = '';
        let intervalId = null;

        // ====== DOM refs ======
        const secretInput = document.getElementById('secretInput');
        const generateBtn = document.getElementById('generateBtn');
        const errorMsg = document.getElementById('errorMsg');
        const codeBox = document.getElementById('codeBox');
        const codeDisplay = document.getElementById('codeDisplay');
        const secretDisplay = document.getElementById('secretDisplay');
        const progressFill = document.getElementById('progressFill');
        const nextCodeDisplay = document.getElementById('nextCodeDisplay');
        const copyBtn = document.getElementById('copyBtn');

        // ====== Load secret from URL path ======
        function loadSecretFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const key = params.get('key');
    if (key && key.length >= 8) {
        secretInput.value = key;
        return key;
    }
    return null;
}

        // ====== Start generating ======
        async function startGeneration(rawSecret) {
            let cleaned = rawSecret.toUpperCase().replace(/[^A-Z2-7]/g, '');
            let bytes = base32ToBytes(cleaned);
            if (!bytes || bytes.length < 6) {
                errorMsg.textContent = 'Invalid secret — enter a valid Base32 key';
                errorMsg.classList.add('show');
                codeBox.classList.remove('show');
                if (intervalId) { clearInterval(intervalId); intervalId = null; }
                return false;
            }

            errorMsg.classList.remove('show');
            secretBytes = bytes;
            secretStr = cleaned;
            secretDisplay.textContent = 'Secret: ' + secretStr;
            codeBox.classList.add('show');
            await updateDisplay();
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(updateDisplay, 1000);
            return true;
        }

        async function updateDisplay() {
            if (!secretBytes) return;
            const now = Math.floor(Date.now() / 1000);
            const elapsed = now % 30;
            const progress = (elapsed / 30) * 100;
            progressFill.style.width = (100 - progress) + '%';

            const currentCode = await totp(secretBytes, now);
            codeDisplay.textContent = currentCode;

            const next = await nextTotp(secretBytes);
            nextCodeDisplay.innerHTML = 'Next code (<span>' + next.code + '</span>) in <span> ' + next.secondsUntil + '</span>s';
        }

        // ====== Copy ======
        copyBtn.addEventListener('click', async () => {
            const code = codeDisplay.textContent;
            if (!code || code === '------') return;
            try {
                await navigator.clipboard.writeText(code);
            } catch {
                const ta = document.createElement('textarea');
                ta.value = code; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
            }
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1500);
        });

        // ====== Button click ======
        generateBtn.addEventListener('click', () => {
            const val = secretInput.value.trim();
            if (!val) {
                errorMsg.textContent = 'Please enter a secret key';
                errorMsg.classList.add('show');
                return;
            }
            startGeneration(val);
        });

        // ====== Enter key ======
        secretInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = secretInput.value.trim();
                if (val) startGeneration(val);
            }
        });

        // ====== Init: auto-load from URL ======
        (async function init() {
           const pathSecret = loadSecretFromQuery();
            if (pathSecret) {
                await startGeneration(pathSecret);
            }
        })();

        console.log('Babayshop 2FA Generator ready');
    </script>
</body>
</html>
