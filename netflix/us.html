
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Nota Generator - Sharing US</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .netflix-background {
            background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/e94073b0-a056-402f-9015-16cb1e7e45c2/web/ID-en-20251110-TRIFECTA-perspective_29287120-1497-47a9-8b0a-49e7ded22f31_large.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .slide-in-up { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="netflix-background text-white min-h-screen">
    <div class="min-h-screen w-full bg-black/80 flex items-center justify-center p-4">
        <div class="w-full max-w-md md:max-w-lg bg-black/80 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-800 p-6 md:p-10 fade-in">
            <div class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-black uppercase text-red-600">Netflix US</h1>
                <p class="text-gray-300 text-lg mt-2">Nota Generator Auto-Login</p>
            </div>

            <form id="notaForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">Nomor Order</label>
                        <input type="text" id="nomorOrder" required placeholder="ORD-123" class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg p-2.5 focus:ring-red-500">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">Durasi</label>
                        <input type="text" id="durasi" required placeholder="1 Bulan / 30 Hari" value="30 Hari" class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg p-2.5 focus:ring-red-500">
                    </div>
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">Email Akun</label>
                    <input type="email" id="email" required placeholder="email@akun.com" class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg p-2.5 focus:ring-red-500">
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">Masa Garansi (Hari)</label>
                    <input type="number" id="garansiHari" required placeholder="Contoh: 20" value="20" class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg p-2.5 focus:ring-red-500">
                </div>

                <button type="submit" class="w-full text-white bg-red-600 hover:bg-red-700 font-bold rounded-lg text-lg px-5 py-3 transition-all transform hover:scale-105 shadow-lg shadow-red-500/30 mt-4">
                    Generate Nota
                </button>
            </form>

            <div id="outputSection" class="mt-10 hidden">
                <h2 class="text-2xl font-semibold text-gray-200 mb-4 slide-in-up">Hasil Nota</h2>
                <textarea id="notaOutput" rows="25" class="w-full bg-gray-900 border border-gray-700 text-gray-300 text-sm rounded-lg p-4 font-mono slide-in-up" readonly></textarea>
                
                <div class="mt-4 flex flex-col sm:flex-row gap-4 slide-in-up">
                    <button id="editButton" class="w-full sm:w-auto text-white bg-amber-600 hover:bg-amber-700 font-medium rounded-lg text-sm px-5 py-2.5">Edit Nota</button>
                    <button id="copyButton" class="w-full sm:w-auto text-white bg-green-600 hover:bg-green-700 font-medium rounded-lg text-sm px-5 py-2.5">Salin Nota</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('notaForm').addEventListener('submit', (e) => {
                e.preventDefault();

                const nomorOrder = document.getElementById('nomorOrder').value;
                const email = document.getElementById('email').value;
                const durasi = document.getElementById('durasi').value;
                const garansiInput = parseInt(document.getElementById('garansiHari').value);

                const now = new Date();
                const options = { day: '2-digit', month: 'short', year: 'numeric' };
                const tglOrder = now.toLocaleDateString('id-ID', options);

                // Hitung Tanggal Garansi
                const tglGaransiExpired = new Date();
                tglGaransiExpired.setDate(now.getDate() + garansiInput);
                const tglGaransiStr = tglGaransiExpired.toLocaleDateString('id-ID', options);

                const notaTemplate = `Waktu Order : ${tglOrder}
Nomor Order : ${nomorOrder}

✨ NETFLIX SHARING US SHARING (${durasi}) ✨
Sistem Auto-Login (Tanpa Password)

────────────────────────────
🚀 CARA LOGIN KE DEVICE:
1. Buka website: https://app.ronestore.xyz/
2. Masukkan Email di atas pada kolom yang tersedia, lalu klik "GENERATE".
3. Jika sukses, pilih salah satu akses device yang digunakan:
   💻 LOGIN WITH PC  -> Klik "OPEN PC ACCESS"
   📱 LOGIN WITH PHONE -> Klik "OPEN PHONE ACCESS"
   📺 LOGIN WITH TV -> Klik "OPEN TV ACCESS"
4. Aplikasi Netflix akan otomatis terbuka dan langsung masuk ke akun.
5. Pilih Profile BEBAS, asalkan JANGAN pilih profile KIDS (karena ada batasan film).

🔒 DETAIL AKSES LOGIN 🔒
📧 Email : ${email}
🌐 Web App : https://app.ronestore.xyz/
👤 Profile : Bebas Pilih (JANGAN PROFILE KIDS!)

────────────────────────────
❌ ATURAN KERAS (MELANGGAR = HANGUS & BAN) ❌
1. DILARANG KERAS mengganti nama profil!
2. JANGAN GUNAKAN ATAU TAMBAH PIN pada profil!
3. HANYA UNTUK 1 DEVICE!
4. DILARANG SIGN OUT dari akun!
5. JANGAN MENGOTAK-ATIK password dan profil akun!
6. DILARANG KERAS MENGGUNAKAN VPN!

────────────────────────────
⚠ SYARAT & KETENTUAN GARANSI:
• MEMBELI = SETUJU, TIDAK ADA REFUND!
• ✅ GARANSI FULL ${garansiInput} HARI (s/d : ${tglGaransiStr})
• Jika dalam masa 20 hari akun bermasalah/mati, langsung lapor admin untuk diganti akun baru.
• Ini adalah Netflix Sharing US, akun milik orang US asli (kita menumpang menonton). Jadi harap patuhi aturan agar awet.`.trim();

                const output = document.getElementById('notaOutput');
                output.value = notaTemplate;
                document.getElementById('outputSection').classList.remove('hidden');
                output.scrollIntoView({ behavior: 'smooth' });
            });

            // Logika Copy & Edit
            document.getElementById('copyButton').addEventListener('click', function() {
                const output = document.getElementById('notaOutput');
                output.select();
                document.execCommand('copy');
                this.textContent = 'Berhasil Disalin!';
                setTimeout(() => { this.textContent = 'Salin Nota'; }, 2000);
            });

            document.getElementById('editButton').addEventListener('click', function() {
                const output = document.getElementById('notaOutput');
                output.readOnly = false;
                output.focus();
                this.textContent = 'Mode Edit Aktif';
            });
        });
    </script>
</body>
</html>
