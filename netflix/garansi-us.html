<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babayshop - Warranty Generator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4 sm:p-6">

    <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- KIRI: INPUT FORM -->
        <div class="glass rounded-2xl p-6 shadow-2xl flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-red-500/20 text-red-500 w-10 h-10 rounded-lg flex items-center justify-center shadow-lg shadow-red-500/10">
                        <i class="fa-solid fa-ticket text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-wide">Netflix Generator</h1>
                        <p class="text-xs text-slate-400">Buat format monitoring garansi dengan cepat</p>
                    </div>
                </div>

                <form id="orderForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Tanggal Order</label>
                            <input type="text" id="tgl_order" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 transition-all text-slate-200">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Username</label>
                            <input type="text" id="username" value="@babay" placeholder="@username" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 transition-all text-slate-200">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Plan Netflix</label>
                            <input type="text" id="plan" value="Netflix Premium" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 transition-all text-slate-200">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Durasi</label>
                            <input type="text" id="durasi" value="1 bulan" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 transition-all text-slate-200">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Merk Device</label>
                            <input type="text" id="device" placeholder="Contoh: Web Browser / Android" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 transition-all text-slate-200">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Lokasi Device</label>
                            <input type="text" id="lokasi" placeholder="Contoh: Bandung" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 transition-all text-slate-200">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Email Netflix</label>
                        <input type="email" id="email" placeholder="email@gmail.com" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 transition-all text-slate-200">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Nomor Order</label>
                            <button type="button" onclick="generateOrderNum()" class="text-[11px] text-red-400 hover:text-red-300 transition-colors"><i class="fa-solid fa-arrows-rotate mr-1"></i>Acak Nomor</button>
                        </div>
                        <input type="text" id="no_order" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm font-mono focus:outline-none focus:border-red-500 transition-all text-slate-200">
                    </div>
                </form>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-800 flex gap-3">
                <button type="button" onclick="resetForm()" class="px-4 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-sm font-medium transition-all">
                    Reset
                </button>
                <button type="button" onclick="generateOutput()" class="flex-1 bg-gradient-to-r from-red-600 to-rose-500 hover:from-red-500 hover:to-rose-400 text-white font-semibold py-3 px-4 rounded-xl text-sm shadow-lg shadow-red-600/20 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Format
                </button>
            </div>
        </div>

        <!-- KANAN: OUTPUT RESULT -->
        <div class="glass rounded-2xl p-6 shadow-2xl flex flex-col justify-between border-l-4 border-l-red-500">
            <div class="h-full flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-2 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                        <i class="fa-solid fa-terminal text-red-400"></i> Live Preview Result
                    </div>
                    <span class="bg-emerald-500/10 text-emerald-400 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wide flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Ready to Copy
                    </span>
                </div>

                <!-- Textarea Output -->
                <div class="relative flex-1 min-h-[280px] bg-slate-950/60 border border-slate-800 rounded-xl p-4 font-mono text-sm leading-relaxed text-slate-300 select-all overflow-y-auto">
                    <pre id="outputResult" class="whitespace-pre-wrap font-mono"></pre>
                </div>
            </div>

            <button type="button" onclick="copyToClipboard()" id="copyBtn" class="mt-4 w-full bg-slate-800 hover:bg-slate-700 active:scale-[0.99] text-slate-200 font-medium py-3 px-4 rounded-xl text-sm transition-all flex items-center justify-center gap-2 border border-slate-700">
                <i class="fa-regular fa-copy"></i> <span id="btnText">Salin Teks Format</span>
            </button>
        </div>

    </div>

    <script>
        // Set otomatis tanggal hari ini dengan format (DD MMM YYYY)
        function setTodayDate() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const d = new Date();
            const day = String(d.getDate()).padStart(2, '0');
            const month = months[d.getMonth()];
            const year = d.getFullYear();
            document.getElementById('tgl_order').value = `${day} ${month} ${year}`;
        }

        // Generate Acak Kode Order (ORD-XXXX)
        function generateOrderNum() {
            const chars = '0123456789ABCDEF';
            let result1 = '';
            let result2 = '';
            for (let i = 0; i < 8; i++) result1 += chars[Math.floor(Math.random() * 16)];
            for (let i = 0; i < 4; i++) result2 += chars[Math.floor(Math.random() * 16)];
            document.getElementById('no_order').value = `ORD-${result1}${result2}`;
        }

        // Fungsi Utama Gabungkan Input jadi Format Monitoring
        function generateOutput() {
            const tgl = document.getElementById('tgl_order').value || '-';
            const user = document.getElementById('username').value || '-';
            const plan = document.getElementById('plan').value || '-';
            const durasi = document.getElementById('durasi').value || '-';
            const device = document.getElementById('device').value || '-';
            const lokasi = document.getElementById('lokasi').value || '-';
            const email = document.getElementById('email').value || '-';
            const order = document.getElementById('no_order').value || '-';

            const template = `✥. tanggal order :: ${tgl}
✥. username :: ${user}
✥. plan netflix :: ${plan}
✥. durasi :: ${durasi}
✥. merk device :: ${device}
✥. lokasi device :: ${lokasi}
✥. email netflix :: ${email}
✥. nomor order :: ${order}`;

            document.getElementById('outputResult').textContent = template;
        }

        // Salin Teks ke Clipboard
        function copyToClipboard() {
            const text = document.getElementById('outputResult').textContent;
            if(!text) return;

            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                const textBtn = document.getElementById('btnText');
                
                btn.classList.replace('bg-slate-800', 'bg-emerald-600');
                btn.classList.replace('text-slate-200', 'text-white');
                textBtn.innerHTML = "Berhasil Disalin!";
                
                setTimeout(() => {
                    btn.classList.replace('bg-emerald-600', 'bg-slate-800');
                    btn.classList.replace('text-white', 'text-slate-200');
                    textBtn.innerHTML = "Salin Teks Format";
                }, 2000);
            });
        }

        // Reset semua field form
        function resetForm() {
            document.getElementById('orderForm').reset();
            setTodayDate();
            generateOrderNum();
            generateOutput();
        }

        // Jalankan fungsi otomatis saat pertama kali dibuka
        window.onload = function() {
            setTodayDate();
            generateOrderNum();
            generateOutput();
            
            // Pasang event listener agar live preview jalan otomatis saat mengetik
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('input', generateOutput);
            });
        };
    </script>
</body>
</html>
