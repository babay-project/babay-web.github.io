<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Nota Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .netflix-background {
            background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/e94073b0-a056-402f-9015-16cb1e7e45c2/web/ID-en-20251110-TRIFECTA-perspective_29287120-1497-47a9-8b0a-49e7ded22f31_large.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in-up {
            animation: slideInUp 0.6s ease-out forwards;
        }

        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #111;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #E50914;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #b30710;
        }
    </style>
</head>
<body class="netflix-background text-white min-h-screen">

    <div class="min-h-screen w-full bg-black/80 flex items-center justify-center p-4">
        <div class="w-full max-w-md md:max-w-lg bg-black/80 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-800 p-6 md:p-10 fade-in">

            <div class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-black uppercase text-red-600">
                    Netflix
                </h1>
                <p class="text-gray-300 text-lg mt-2">Nota Generator Premium</p>
            </div>

            <form id="notaForm" class="space-y-5">

                <div>
                    <label for="nomorOrder" class="block mb-2 text-sm font-medium text-gray-300">Nomor Order</label>
                    <input type="text" id="nomorOrder" name="nomorOrder" required placeholder="Isi nomor order..."
                           class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block p-2.5 transition-all duration-300 placeholder-gray-500">
                </div>

                <div>
                    <label for="email" class="block mb-2 text-sm font-medium text-gray-300">Email</label>
                    <input type="email" id="email" name="email" required placeholder="email@akun.com"
                           class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block p-2.5 transition-all duration-300 placeholder-gray-500">
                </div>

                <div>
                    <label for="password" class="block mb-2 text-sm font-medium text-gray-300">Password</label>
                    <input type="text" id="password" name="password" required placeholder="Masukkan password..."
                           class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block p-2.5 transition-all duration-300 placeholder-gray-500">
                </div>

                <div>
                    <label for="profilMode" class="block mb-2 text-sm font-medium text-gray-300">Profile</label>
                    <select id="profilMode" name="profilMode"
                            class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block p-2.5 transition-all duration-300">
                        <option value="bebas">Bebas Pilih (asal jangan profile kids)</option>
                        <option value="custom">Isi sendiri</option>
                    </select>
                </div>

                <div id="profilCustomWrapper" class="hidden">
                    <label for="profilCustom" class="block mb-2 text-sm font-medium text-gray-300">Isi Profile Sendiri</label>
                    <input type="text" id="profilCustom" name="profilCustom" placeholder="Contoh: Profil 1"
                           class="w-full bg-gray-800/70 border border-gray-700 text-white text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block p-2.5 transition-all duration-300 placeholder-gray-500">
                </div>

                <button type="submit"
                        class="w-full text-white bg-red-600 hover:bg-red-700 focus:ring-4 focus:outline-none focus:ring-red-800 font-bold rounded-lg text-lg px-5 py-3 text-center transition-all duration-300 transform hover:scale-105 shadow-lg shadow-red-500/30 mt-8">
                    Generate Nota
                </button>
            </form>

            <div id="outputSection" class="mt-10 hidden">
                <h2 class="text-2xl font-semibold text-gray-200 mb-4 slide-in-up">Hasil Nota</h2>

                <textarea id="notaOutput" rows="28"
                          class="w-full bg-gray-900 border border-gray-700 text-gray-300 text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block p-4 font-mono slide-in-up"
                          style="animation-delay: 100ms;" readonly></textarea>

                <div class="mt-4 flex flex-col sm:flex-row items-center gap-4 slide-in-up" style="animation-delay: 200ms;">
                    <button id="editButton"
                            class="w-full sm:w-auto text-white bg-amber-600 hover:bg-amber-700 focus:ring-4 focus:outline-none focus:ring-amber-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center transition-all duration-300 transform hover:scale-105">
                        Edit Nota
                    </button>
                    <button id="copyButton"
                            class="w-full sm:w-auto text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:outline-none focus:ring-green-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center transition-all duration-300 transform hover:scale-105">
                        Salin Nota
                    </button>
                    <span id="copyMessage" class="text-green-400 text-sm hidden sm:ml-4">Berhasil disalin!</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const notaFormEl = document.getElementById('notaForm');
            const outputSectionEl = document.getElementById('outputSection');
            const notaOutputEl = document.getElementById('notaOutput');
            const copyButtonEl = document.getElementById('copyButton');
            const copyMessageEl = document.getElementById('copyMessage');
            const editButtonEl = document.getElementById('editButton');

            const profilModeEl = document.getElementById('profilMode');
            const profilCustomWrapperEl = document.getElementById('profilCustomWrapper');
            const profilCustomEl = document.getElementById('profilCustom');

            profilModeEl.addEventListener('change', () => {
                if (profilModeEl.value === 'custom') {
                    profilCustomWrapperEl.classList.remove('hidden');
                    profilCustomEl.required = true;
                } else {
                    profilCustomWrapperEl.classList.add('hidden');
                    profilCustomEl.required = false;
                    profilCustomEl.value = '';
                }
            });

            notaFormEl.addEventListener('submit', (e) => {
                e.preventDefault();

                const nomorOrder = document.getElementById('nomorOrder').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                let profil = 'Bebas Pilih (asal jangan profile kids)';
                if (profilModeEl.value === 'custom') {
                    profil = profilCustomEl.value.trim();
                }

                const now = new Date();
                const options = { day: '2-digit', month: 'short', year: 'numeric' };
                const tgl = now.toLocaleDateString('id-ID', options);

                const notaTemplate = `
Waktu Order : ${tgl}
Nomor Order : ${nomorOrder}

✨ NETFLIX 1 DEVICE ✨ 
🔒 DETAIL AKUN 🔒
📧 Email : ${email}
🔑 Password : ${password}
👤 Profile : ${profil}

────────────────────────────
⚠ Perhatian Penting:

TOLONG DIBACA CARA LOGIN NYA YA KAKAK:
KALO DIMINTA KODE, KLIK "DAPATKAN BANTUAN" / "GET HELP"
LALU KLIK "GUNAKAN SANDI" / "USE PASSWORD" YA

✅ MAX GARANSI 25 hari dan harus mengikuti peraturan
✅ WAJIB laporan device jika berhasil login
📶 WAJIB login menggunakan data seluler / hotspot dari kuota pribadi
Jangan pakai WiFi publik dulu saat login
Kalau sudah untuk nonton, boleh pakai WiFi provider (Indihome, Biznet, dll)

🚫 DILARANG mengubah email, password, profil, ataupun setting akun
HANYA BOLEH NONTON

📺 Maksimal digunakan untuk 1 device saja
Jika ketahuan lebih, AKSES KAMI CABUT & NO GARANSI

🚫 Jika terdapat tulisan salah password, jangan dipaksa login
Segera lapor admin

🧹 Pastikan clear cache browser / aplikasi sebelum login

📺 Untuk user SMART TV:
Jika di TV tidak bisa login langsung menggunakan email & Password, silahkan LOGIN MELALUI Browser HP (akses kode nya cek di link bawah)
atau bisa kami bantu login menggunakan kode

Berikut link bantuan Netflix:
A. Hapus cookies Netflix:
https://www.netflix.com/clearcookies

B. Akses kode login untuk TV:
https://www.netflix.com/tv2
(masukkan kode yang ada di TV, lalu masukkan email & password akun)

C. Login Netflix di browser agar muncul halaman email & password:
1. https://help.netflix.com/id/node/311830241325668
2. Klik "Gabung ke Netflix"
3. Klik "Masuk"
4. Akan muncul halaman login berupa Email & Password
`.trim();

                notaOutputEl.value = notaTemplate;
                notaOutputEl.readOnly = true;
                outputSectionEl.classList.remove('hidden');

                editButtonEl.textContent = 'Edit Nota';
                editButtonEl.classList.remove('bg-gray-600');
                editButtonEl.classList.add('bg-amber-600');
                editButtonEl.disabled = false;

                outputSectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });

            copyButtonEl.addEventListener('click', () => {
                notaOutputEl.select();
                try {
                    document.execCommand('copy');
                    copyMessageEl.classList.remove('hidden');
                    copyButtonEl.textContent = 'Berhasil Disalin!';
                    copyButtonEl.classList.replace('bg-green-600', 'bg-blue-600');

                    setTimeout(() => {
                        copyMessageEl.classList.add('hidden');
                        copyButtonEl.textContent = 'Salin Nota';
                        copyButtonEl.classList.replace('bg-blue-600', 'bg-green-600');
                    }, 2500);
                } catch (err) {
                    console.error('Gagal menyalin teks: ', err);
                    copyMessageEl.textContent = 'Gagal menyalin!';
                    copyMessageEl.classList.replace('text-green-400', 'text-red-400');
                    copyMessageEl.classList.remove('hidden');
                }
            });

            editButtonEl.addEventListener('click', () => {
                notaOutputEl.readOnly = false;
                notaOutputEl.focus();

                editButtonEl.textContent = 'Mode Edit Aktif';
                editButtonEl.classList.remove('bg-amber-600');
                editButtonEl.classList.add('bg-gray-600');
                editButtonEl.disabled = true;
            });
        });
    </script>

<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"6da13f81a4834c19b7163863b8805240","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
