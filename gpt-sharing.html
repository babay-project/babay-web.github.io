<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Sharing Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[#202124] min-h-screen py-12 px-4 flex justify-center items-start">

    <div class="w-full max-w-xl bg-white border border-[#dadce0] rounded-2xl shadow-sm overflow-hidden transition-all duration-300">
        
        <!-- Header Minimalis -->
        <div class="px-8 py-6 border-b border-[#f1f3f4]">
            <div class="flex items-center gap-3">
                <div class="text-[#1a73e8]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-medium tracking-tight text-[#202124]">GPT Sharing Generator</h1>
                    <p class="text-xs text-[#5f6368] mt-0.5">Buat nota WhatsApp otomatis untuk pelanggan premium</p>
                </div>
            </div>
        </div>

        <!-- Form Input -->
        <div class="p-8 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-[#5f6368] mb-1.5">Nama Toko / Brand</label>
                    <input type="text" id="inputBrand" class="w-full px-3 py-2 bg-white border border-[#dadce0] rounded-md focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none text-sm transition text-[#202124]" value="BABAYSHOP.ID">
                </div>
                <div>
                    <label class="block text-xs font-medium text-[#5f6368] mb-1.5">Pilihan Aplikasi / Plan</label>
                    <select id="inputPlan" class="w-full px-3 py-2 bg-white border border-[#dadce0] rounded-md focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none text-sm transition text-[#202124] h-[38px]">
                        <option value="GPT Plus">GPT Plus</option>
                        <option value="GPT Go">GPT Go</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-[#5f6368] mb-1.5">Email Akses</label>
                    <input type="email" id="inputEmail" class="w-full px-3 py-2 bg-white border border-[#dadce0] rounded-md focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none text-sm transition text-[#202124] placeholder-gray-400" placeholder="user@email.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-[#5f6368] mb-1.5">Nama Folder</label>
                    <input type="text" id="inputFolder" class="w-full px-3 py-2 bg-white border border-[#dadce0] rounded-md focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none text-sm transition text-[#202124] placeholder-gray-400" placeholder="Contoh: Folder-Budi">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-[#5f6368] mb-1.5">Durasi Paket</label>
                    <input type="text" id="inputDurasi" class="w-full px-3 py-2 bg-white border border-[#dadce0] rounded-md focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none text-sm transition text-[#202124]" value="1 Bulan">
                </div>
                <div>
                    <label class="block text-xs font-medium text-[#5f6368] mb-1.5">Masa Garansi</label>
                    <input type="text" id="inputGaransi" class="w-full px-3 py-2 bg-white border border-[#dadce0] rounded-md focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none text-sm transition text-[#202124]" value="25 Hari Garansi">
                </div>
            </div>

            <button type="button" onclick="generateNota()" class="w-full bg-[#1a73e8] hover:bg-[#1557b0] text-white font-medium py-2.5 px-4 rounded-md transition duration-150 text-sm mt-2 shadow-sm">
                Generate Nota
            </button>
        </div>

        <!-- Bagian Hasil Output -->
        <div id="resultSection" class="hidden bg-[#f8f9fa] p-8 border-t border-[#f1f3f4] space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-xs font-medium text-[#5f6368] tracking-wide">
                    Silakan edit atau langsung salin nota di bawah ini:
                </span>
            </div>

            <!-- Textarea yang fleksibel bisa langsung diedit tangan -->
            <textarea id="outputNota" rows="18" class="w-full p-4 bg-white border border-[#dadce0] rounded-lg font-mono text-xs focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] outline-none leading-relaxed text-[#202124] shadow-sm"></textarea>

            <button type="button" id="btnSalin" onclick="salinNota()" class="w-full bg-[#34a853] hover:bg-[#2b8a44] text-white font-medium py-2.5 px-4 rounded-md transition duration-150 text-sm flex items-center justify-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                <span id="textSalin">Salin Teks Nota</span>
            </button>
        </div>

    </div>

    <script>
        function generateNota() {
            const brand = document.getElementById('inputBrand').value || 'STORE';
            const plan = document.getElementById('inputPlan').value || 'GPT Plus';
            const email = document.getElementById('inputEmail').value || '-';
            const folder = document.getElementById('inputFolder').value || '-';
            const durasi = document.getElementById('inputDurasi').value || '1 Bulan';
            const garansi = document.getElementById('inputGaransi').value || '1 Bulan Garansi';

            let textTemplate = `─── ✨ NOTA PEMBELIAN ${brand.toUpperCase()} ✨ ───\n\n`;
            textTemplate += `🚀 DETAIL AKSES PREMIUM:\n`;
            textTemplate += `🔹 Layanan: ${plan}\n`;
            textTemplate += `📧 Email Akses: ${email}\n`;
            textTemplate += `📅 Durasi Paket: ${durasi}\n`;
            textTemplate += `🛡️ Masa Garansi: ${garansi}\n`;
            textTemplate += `📂 Nama Folder Anda: [ ${folder} ]\n\n`;
            
            // Penambahan Tutorial Login Otomatis sesuai permintaan
            textTemplate += `📲 TUTORIAL LOGIN AKUN:\n`;
            textTemplate += `1. Pastikan di aplikasi / web GPT posisi Anda sudah LOG OUT (tidak sedang login di akun pribadi).\n`;
            textTemplate += `2. Klik 'Masuk / Log In'.\n`;
            textTemplate += `3. Ketika muncul pilihan (Google, Apple, No HP, dll), abaikan semuanya. Pilih opsi paling bawah: 'Masukkan Email'.\n`;
            textTemplate += `4. Masukkan 'Email Akses' yang tertera di atas, lalu lanjut.\n`;
            textTemplate += `5. Jika sistem meminta kode OTP, segera infokan ke Seller.\n`;
            textTemplate += `⚠️ Catatan: Pastikan Anda dan Seller sama-sama online dan siap, karena kode OTP ini hangus dengan sangat cepat!\n\n`;

            textTemplate += `⚠️ SYARAT & KETENTUAN PENGGUNAAN:\n`;
            textTemplate += `1. 1 Orang = 1 Device: Dilarang login di banyak perangkat sekaligus. Mau ganti device wajib log out dulu dari device sebelumnya.\n`;
            textTemplate += `2. Wajib Masuk Folder: Saat membuka aplikasi/web GPT, Anda wajib masuk folder masing-masing dulu.\n`;
            textTemplate += `3. Pembersihan Prompt: Semisal ditemukan ada prompt di luar folder, maka dalam waktu 1x24 jam akan kami hapus otomatis.\n`;
            textTemplate += `4. Privasi Folder: Dilarang keras mengutak-atik atau melihat isi folder milik kustomer yang lain.\n`;
            textTemplate += `5. Gunakan Bijak: Masukkan prompt secukupnya, jangan terlalu panjang-panjang dan menghindari spamming.\n\n`;
            
            textTemplate += `🚨 PENTING! PERINGATAN BACKUP DATA CHAT/PROMPT:\n`;
            textTemplate += `• Mohon untuk menyalin/mem-backup secara berkala semua prompt penting dan jawaban yang dihasilkan oleh AI ke dokumen pribadi Anda (seperti Microsoft Word, Catatan/Notes HP, atau media backup lainnya).\n`;
            textTemplate += `• Apabila terjadi kendala teknis atau kerusakan sistem pada akun, KAMI HANYA MEMBERIKAN GANTI AKUN BARU (selama masa garansi aktif). Kami TIDAK BISA MENGEMBALIKAN / MEMULIHKAN DATA RIWAYAT CHAT Anda sebelumnya karena keterbatasan sistem dari pusat GPT.\n\n`;
            
            textTemplate += `🎉 Terima kasih sudah berlangganan di ${brand}! Gunakan akun Anda dengan bijak ya, Kak! 🙌✨`;

            document.getElementById('outputNota').value = textTemplate;

            const resultSection = document.getElementById('resultSection');
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth' });
            
            // Reset button text jika generate ulang
            document.getElementById('textSalin').innerText = "Salin Teks Nota";
            document.getElementById('btnSalin').classList.replace('bg-[#4285f4]', 'bg-[#34a853]');
        }

        function salinNota() {
            const copyText = document.getElementById('outputNota');
            const textSalin = document.getElementById('textSalin');
            const btnSalin = document.getElementById('btnSalin');
            
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(copyText.value).then(() => {
                // Feedback visual tombol
                textSalin.innerText = "Copied! ✓";
                btnSalin.classList.replace('bg-[#34a853]', 'bg-[#4285f4]');
                
                setTimeout(() => {
                    textSalin.innerText = "Salin Teks Nota";
                    btnSalin.classList.replace('bg-[#4285f4]', 'bg-[#34a853]');
                }, 2000);
            });
        }
    </script>
</body>
</html>
