<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Sharing Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --galaxy-1: #070018;
            --galaxy-2: #140033;
            --galaxy-3: #2b0a5f;
            --neon-pink: #ff4ecd;
            --neon-blue: #43d9ff;
            --neon-purple: #9d6cff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #ffffff;
            background:
                radial-gradient(circle at 15% 15%, rgba(255, 78, 205, 0.32), transparent 28%),
                radial-gradient(circle at 85% 10%, rgba(67, 217, 255, 0.28), transparent 30%),
                radial-gradient(circle at 50% 85%, rgba(157, 108, 255, 0.32), transparent 32%),
                linear-gradient(135deg, var(--galaxy-1), var(--galaxy-2) 45%, #050013);
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.95) 1px, transparent 1.6px),
                radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1.4px);
            background-size: 72px 72px, 118px 118px;
            background-position: 0 0, 35px 55px;
            opacity: 0.42;
            animation: starsMove 24s linear infinite;
        }

        body::after {
            background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.08), transparent 80%);
            transform: translateX(-100%);
            animation: auroraSweep 8s ease-in-out infinite;
        }

        @keyframes starsMove {
            from { background-position: 0 0, 35px 55px; }
            to { background-position: 220px 320px, 255px 375px; }
        }

        @keyframes auroraSweep {
            0%, 100% { transform: translateX(-120%); opacity: 0; }
            40%, 60% { opacity: 1; }
            100% { transform: translateX(120%); opacity: 0; }
        }

        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(12, 8, 35, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.52),
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                0 0 44px rgba(157, 108, 255, 0.20);
            backdrop-filter: blur(20px);
        }

        .input-galaxy,
        .select-galaxy,
        .textarea-galaxy {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            outline: none;
            transition: 0.2s ease;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .input-galaxy::placeholder,
        .textarea-galaxy::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        .input-galaxy:focus,
        .select-galaxy:focus,
        .textarea-galaxy:focus {
            border-color: rgba(67, 217, 255, 0.9);
            box-shadow:
                0 0 0 4px rgba(67, 217, 255, 0.14),
                0 0 24px rgba(67, 217, 255, 0.14);
            background: rgba(255, 255, 255, 0.11);
        }

        .select-galaxy option {
            background: #16072f;
            color: #ffffff;
        }

        .btn-galaxy {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--neon-blue));
            box-shadow: 0 14px 34px rgba(157, 108, 255, 0.36);
        }

        .btn-galaxy:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 18px 42px rgba(67, 217, 255, 0.28);
        }

        .btn-copy {
            background: linear-gradient(135deg, #20e3b2, #43d9ff);
            box-shadow: 0 14px 34px rgba(67, 217, 255, 0.24);
        }
    </style>
</head>
<body class="px-4 py-8 sm:py-12 flex justify-center items-start">

    <main class="w-full max-w-2xl glass-card rounded-[2rem] overflow-hidden">
        
        <!-- Header Galaxy -->
        <div class="relative px-6 sm:px-8 py-8 border-b border-white/10">
            <div class="absolute -top-20 -right-20 w-52 h-52 bg-fuchsia-500/20 blur-3xl rounded-full"></div>
            <div class="absolute -bottom-24 -left-20 w-60 h-60 bg-cyan-400/20 blur-3xl rounded-full"></div>

            <div class="relative flex items-start gap-4">
                <div class="h-12 w-12 shrink-0 rounded-2xl bg-white/10 border border-white/15 flex items-center justify-center shadow-lg shadow-purple-950/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.889a1 1 0 00-.364 1.118l1.519 4.674c.3.921-.755 1.688-1.538 1.118l-3.976-2.889a1 1 0 00-1.176 0l-3.976 2.889c-.783.57-1.838-.197-1.538-1.118l1.519-4.674a1 1 0 00-.364-1.118L3.077 10.1c-.783-.57-.38-1.81.588-1.81H8.58a1 1 0 00.95-.69l1.519-4.674z" />
                    </svg>
                </div>
                <div>
                    <p class="text-xs font-semibold tracking-[0.3em] text-cyan-200/90 uppercase">Galaxy Mode</p>
                    <h1 class="mt-2 text-2xl sm:text-3xl font-extrabold tracking-tight">GPT Sharing Generator</h1>
                    <p class="mt-2 text-sm text-white/65 leading-relaxed">Buat nota WhatsApp otomatis untuk pelanggan premium dengan tampilan lebih rapi dan mudah dipakai.</p>
                </div>
            </div>
        </div>

        <!-- Form Input Vertikal -->
        <div class="p-6 sm:p-8 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-white/80 mb-2">Nama Toko / Brand</label>
                <input type="text" id="inputBrand" class="input-galaxy px-4 py-3 rounded-2xl text-sm" value="BABAYSHOP.ID">
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/80 mb-2">Pilihan Aplikasi / Plan</label>
                <select id="inputPlan" class="select-galaxy px-4 py-3 rounded-2xl text-sm h-[48px]">
                    <option value="GPT Plus">GPT Plus</option>
                    <option value="GPT Go">GPT Go</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/80 mb-2">Email Akses</label>
                <input type="email" id="inputEmail" class="input-galaxy px-4 py-3 rounded-2xl text-sm" placeholder="user@email.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/80 mb-2">Nama Folder</label>
                <input type="text" id="inputFolder" class="input-galaxy px-4 py-3 rounded-2xl text-sm" placeholder="Contoh: Folder-Budi">
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/80 mb-2">Durasi Paket</label>
                <input type="text" id="inputDurasi" class="input-galaxy px-4 py-3 rounded-2xl text-sm" value="1 Bulan">
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/80 mb-2">Masa Garansi</label>
                <input type="text" id="inputGaransi" class="input-galaxy px-4 py-3 rounded-2xl text-sm" value="25 Hari Garansi">
            </div>

            <button type="button" onclick="generateNota()" class="btn-galaxy w-full text-white font-bold py-3.5 px-5 rounded-2xl transition duration-200 text-sm mt-3 flex items-center justify-center gap-2">
                <span>Generate Nota</span>
                <span>✨</span>
            </button>
        </div>

        <!-- Bagian Hasil Output -->
        <div id="resultSection" class="hidden bg-white/5 p-6 sm:p-8 border-t border-white/10 space-y-4">
            <div class="flex flex-col gap-1">
                <span class="text-sm font-semibold text-white/85">Hasil Nota</span>
                <span class="text-xs text-white/55">Silakan edit atau langsung salin nota di bawah ini.</span>
            </div>

            <!-- Textarea yang fleksibel bisa langsung diedit tangan -->
            <textarea id="outputNota" rows="18" class="textarea-galaxy p-4 rounded-2xl font-mono text-xs leading-relaxed shadow-sm resize-y"></textarea>

            <button type="button" id="btnSalin" onclick="salinNota()" class="btn-copy w-full text-[#06111f] font-bold py-3.5 px-5 rounded-2xl transition duration-200 text-sm flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                <span id="textSalin">Salin Teks Nota</span>
            </button>
        </div>

    </main>

    <script>
        function generateNota() {
            const brand = document.getElementById('inputBrand').value || 'STORE';
            const plan = document.getElementById('inputPlan').value || 'GPT Plus';
            const email = document.getElementById('inputEmail').value || '-';
            const folder = document.getElementById('inputFolder').value || '-';
            const durasi = document.getElementById('inputDurasi').value || '1 Bulan';
            const garansi = document.getElementById('inputGaransi').value || '1 Bulan Garansi';

            let textTemplate = `─── ✨ NOTA PEMBELIAN ${brand.toUpperCase()} ✨ ───\n\n`;
            textTemplate += `🚀 DETAIL AKSES PREMIUM:\n`;
            textTemplate += `🔹 Layanan: ${plan}\n`;
            textTemplate += `📧 Email Akses: ${email}\n`;
            textTemplate += `📅 Durasi Paket: ${durasi}\n`;
            textTemplate += `🛡️ Masa Garansi: ${garansi}\n`;
            textTemplate += `📂 Nama Folder Anda: [ ${folder} ]\n\n`;
            
            // Penambahan Tutorial Login Otomatis sesuai permintaan
            textTemplate += `📲 TUTORIAL LOGIN AKUN:\n`;
            textTemplate += `1. Pastikan di aplikasi / web GPT posisi Anda sudah LOG OUT (tidak sedang login di akun pribadi).\n`;
            textTemplate += `2. Klik 'Masuk / Log In'.\n`;
            textTemplate += `3. Ketika muncul pilihan (Google, Apple, No HP, dll), abaikan semuanya. Pilih opsi paling bawah: 'Masukkan Email'.\n`;
            textTemplate += `4. Masukkan 'Email Akses' yang tertera di atas, lalu lanjut.\n`;
            textTemplate += `5. Jika sistem meminta kode OTP, segera infokan ke Seller.\n`;
            textTemplate += `⚠️ Catatan: Pastikan Anda dan Seller sama-sama online dan siap, karena kode OTP ini hangus dengan sangat cepat!\n\n`;

            textTemplate += `⚠️ SYARAT & KETENTUAN PENGGUNAAN:\n`;
            textTemplate += `1. 1 Orang = 1 Device: Dilarang login di banyak perangkat sekaligus. Mau ganti device wajib log out dulu dari device sebelumnya.\n`;
            textTemplate += `2. Wajib Masuk Folder: Saat membuka aplikasi/web GPT, Anda wajib masuk folder masing-masing dulu.\n`;
            textTemplate += `3. Pembersihan Prompt: Semisal ditemukan ada prompt di luar folder, maka dalam waktu 1x24 jam akan kami hapus otomatis.\n`;
            textTemplate += `4. Privasi Folder: Dilarang keras mengutak-atik atau melihat isi folder milik kustomer yang lain.\n`;
            textTemplate += `5. Gunakan Bijak: Masukkan prompt secukupnya, jangan terlalu panjang-panjang dan menghindari spamming.\n\n`;
            
            textTemplate += `🚨 PENTING! PERINGATAN BACKUP DATA CHAT/PROMPT:\n`;
            textTemplate += `• Mohon untuk menyalin/mem-backup secara berkala semua prompt penting dan jawaban yang dihasilkan oleh AI ke dokumen pribadi Anda (seperti Microsoft Word, Catatan/Notes HP, atau media backup lainnya).\n`;
            textTemplate += `• Apabila terjadi kendala teknis atau kerusakan sistem pada akun, KAMI HANYA MEMBERIKAN GANTI AKUN BARU (selama masa garansi aktif). Kami TIDAK BISA MENGEMBALIKAN / MEMULIHKAN DATA RIWAYAT CHAT Anda sebelumnya karena keterbatasan sistem dari pusat GPT.\n\n`;
            
            textTemplate += `🎉 Terima kasih sudah berlangganan di ${brand}! Gunakan akun Anda dengan bijak ya, Kak! 🙌✨`;

            document.getElementById('outputNota').value = textTemplate;

            const resultSection = document.getElementById('resultSection');
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth' });
            
            // Reset button text jika generate ulang
            document.getElementById('textSalin').innerText = "Salin Teks Nota";
            document.getElementById('btnSalin').classList.remove('bg-[#4285f4]');
        }

        function salinNota() {
            const copyText = document.getElementById('outputNota');
            const textSalin = document.getElementById('textSalin');
            const btnSalin = document.getElementById('btnSalin');
            
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(copyText.value).then(() => {
                // Feedback visual tombol
                textSalin.innerText = "Copied! ✓";
                btnSalin.classList.add('bg-[#4285f4]');
                
                setTimeout(() => {
                    textSalin.innerText = "Salin Teks Nota";
                    btnSalin.classList.remove('bg-[#4285f4]');
                }, 2000);
            });
        }
    </script>
</body>
</html>
