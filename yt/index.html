<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nota Generator YouTube Premium Family</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .yt-bg {
      background:
        radial-gradient(circle at top left, rgba(255, 0, 0, 0.35), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.10), transparent 32%),
        linear-gradient(135deg, #050505 0%, #111111 45%, #1c0000 100%);
    }

    .glass {
      background: rgba(15, 15, 15, 0.86);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .youtube-logo {
      width: 76px;
      height: 54px;
      background: #ff0033;
      border-radius: 17px;
      position: relative;
      box-shadow: 0 0 35px rgba(255, 0, 51, 0.45);
    }

    .youtube-logo::after {
      content: "";
      position: absolute;
      left: 31px;
      top: 17px;
      width: 0;
      height: 0;
      border-left: 19px solid white;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
    }

    textarea::-webkit-scrollbar {
      width: 8px;
    }

    textarea::-webkit-scrollbar-thumb {
      background: #dc2626;
      border-radius: 999px;
    }

    textarea::-webkit-scrollbar-track {
      background: #111827;
    }

    input[type="checkbox"] {
      accent-color: #dc2626;
    }
  </style>
</head>

<body class="yt-bg text-white min-h-screen">
  <main class="min-h-screen w-full flex items-center justify-center p-4 md:p-8">

    <section class="w-full max-w-3xl glass border border-white/10 shadow-2xl rounded-3xl p-5 md:p-9 fade-in-up">

      <div class="flex flex-col items-center text-center mb-8">
        <div class="youtube-logo mb-5"></div>

        <p class="inline-flex items-center gap-2 rounded-full border border-red-500/40 bg-red-500/10 px-4 py-1 text-xs md:text-sm font-semibold text-red-100 mb-4">
          Nota Generator WhatsApp
        </p>

        <h1 class="text-3xl md:text-5xl font-black tracking-tight">
          YouTube Premium Family
        </h1>

        <p class="text-gray-300 mt-3 text-sm md:text-base max-w-xl">
          Buat nota singkat, rapi, dan siap dikirim ke customer via WhatsApp.
        </p>
      </div>

      <form id="notaForm" class="space-y-5">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block mb-2 text-sm font-semibold text-gray-200">Nomor Order</label>
            <input
              type="text"
              id="nomorOrder"
              readonly
              class="w-full bg-black/45 border border-white/10 text-gray-200 rounded-xl px-4 py-3 outline-none cursor-not-allowed"
            />
          </div>

          <div>
            <label class="block mb-2 text-sm font-semibold text-gray-200">Tanggal Invite</label>
            <input
              type="text"
              id="tglInviteDisplay"
              readonly
              class="w-full bg-black/45 border border-white/10 text-gray-200 rounded-xl px-4 py-3 outline-none cursor-not-allowed"
            />
          </div>
        </div>

        <div>
          <label class="block mb-2 text-sm font-semibold text-gray-200">Email Customer</label>
          <input
            type="email"
            id="emailCustomer"
            required
            class="w-full bg-black/45 border border-white/10 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
            placeholder="customer@gmail.com"
          />
        </div>

        <div>
          <label class="block mb-2 text-sm font-semibold text-gray-200">Email Admin yang Invite</label>
          <input
            type="email"
            id="emailAdmin"
            required
            class="w-full bg-black/45 border border-white/10 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
            placeholder="admin@gmail.com"
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

          <div>
            <label class="block mb-2 text-sm font-semibold text-gray-200">Estimasi Durasi</label>
            <input
              type="text"
              id="durasiDisplay"
              readonly
              value="23-28 Hari"
              class="w-full bg-black/45 border border-white/10 text-gray-200 rounded-xl px-4 py-3 outline-none cursor-not-allowed"
            />
          </div>

          <div>
            <label class="block mb-2 text-sm font-semibold text-gray-200">Harga</label>
            <select
              id="harga"
              class="w-full bg-black/45 border border-white/10 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
            >
              <option value="13000">Rp13.000</option>
              <option value="14000">Rp14.000</option>
              <option value="15000">Rp15.000</option>
              <option value="range">Rp13.000 - Rp15.000</option>
            </select>
          </div>

          <div>
            <label class="block mb-2 text-sm font-semibold text-gray-200">Estimasi Habis</label>
            <input
              type="text"
              id="estimasiHabisDisplay"
              readonly
              class="w-full bg-black/45 border border-white/10 text-gray-200 rounded-xl px-4 py-3 outline-none cursor-not-allowed"
            />
          </div>

        </div>

        <div class="rounded-2xl border border-white/10 bg-white/5 p-4 space-y-4">
          <label class="flex items-start gap-3 cursor-pointer">
            <input
              type="checkbox"
              id="pakaiTutor"
              checked
              class="mt-1 w-5 h-5"
            />

            <div>
              <p class="font-bold text-white">Pakai tutor di nota</p>
              <p class="text-sm text-gray-400">
                Centang kalau ingin nota berisi panduan join/perpanjang. Hilangkan centang kalau mau nota super singkat.
              </p>
            </div>
          </label>

          <div id="tutorBox">
            <label class="block mb-2 text-sm font-semibold text-gray-200">Jenis Tutor</label>
            <select
              id="jenisTutor"
              class="w-full bg-black/45 border border-white/10 text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
            >
              <option value="baru">Tutor Invite Email Baru</option>
              <option value="perpanjang">Tutor Perpanjang</option>
              <option value="keduanya">Tutor Email Baru + Perpanjang</option>
            </select>
          </div>
        </div>

        <button
          type="submit"
          class="w-full rounded-xl bg-red-600 hover:bg-red-700 text-white font-black px-5 py-3 transition shadow-lg shadow-red-600/25"
        >
          Generate Nota
        </button>

      </form>

      <div id="outputSection" class="mt-9 hidden">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
          <div>
            <h2 class="text-2xl font-black">Hasil Nota</h2>
            <p class="text-gray-400 text-sm">Sudah dibuat pendek dan cocok untuk WhatsApp.</p>
          </div>

          <div class="flex gap-3">
            <button
              id="editButton"
              class="rounded-lg bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 py-2 text-sm transition"
            >
              Edit Nota
            </button>

            <button
              id="copyButton"
              class="rounded-lg bg-green-600 hover:bg-green-700 text-white font-bold px-4 py-2 text-sm transition"
            >
              Salin Nota
            </button>
          </div>
        </div>

        <textarea
          id="notaOutput"
          rows="24"
          readonly
          class="w-full bg-black/70 border border-white/10 text-gray-100 text-sm rounded-2xl p-4 font-mono outline-none focus:ring-2 focus:ring-red-500"
        ></textarea>

      </div>

    </section>

  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('notaForm');

      const nomorOrderInput = document.getElementById('nomorOrder');
      const tglInviteDisplay = document.getElementById('tglInviteDisplay');

      const emailCustomerInput = document.getElementById('emailCustomer');
      const emailAdminInput = document.getElementById('emailAdmin');

      const hargaInput = document.getElementById('harga');
      const estimasiHabisDisplay = document.getElementById('estimasiHabisDisplay');

      const pakaiTutorInput = document.getElementById('pakaiTutor');
      const tutorBox = document.getElementById('tutorBox');
      const jenisTutorInput = document.getElementById('jenisTutor');

      const outputSection = document.getElementById('outputSection');
      const notaOutput = document.getElementById('notaOutput');
      const copyButton = document.getElementById('copyButton');
      const editButton = document.getElementById('editButton');

      let now = new Date();

      function formatTanggal(date) {
        return date.toLocaleDateString('id-ID', {
          day: '2-digit',
          month: 'long',
          year: 'numeric'
        });
      }

      function formatTanggalLengkap(date) {
        return date.toLocaleDateString('id-ID', {
          weekday: 'long',
          day: '2-digit',
          month: 'long',
          year: 'numeric'
        });
      }

      function formatJam(date) {
        return date.toLocaleTimeString('id-ID', {
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      function formatRupiah(number) {
        return new Intl.NumberFormat('id-ID', {
          style: 'currency',
          currency: 'IDR',
          maximumFractionDigits: 0
        }).format(number);
      }

      function addDays(date, days) {
        const result = new Date(date);
        result.setDate(result.getDate() + Number(days));
        return result;
      }

      function generateOrderNumber() {
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const y = now.getFullYear();

        const h = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');

        return `YT-FAM-${d}${m}${y}-${h}${min}`;
      }

      function getHargaText() {
        const harga = hargaInput.value;

        if (harga === 'range') {
          return 'Rp13.000 - Rp15.000';
        }

        return formatRupiah(Number(harga));
      }

      function getEstimasiHabisText() {
        const tglHabisAwal = addDays(now, 23);
        const tglHabisAkhir = addDays(now, 28);

        return `${formatTanggal(tglHabisAwal)} - ${formatTanggal(tglHabisAkhir)}`;
      }

      function updateTanggalDanOrder() {
        now = new Date();

        nomorOrderInput.value = generateOrderNumber();
        tglInviteDisplay.value = `${formatTanggalLengkap(now)}, ${formatJam(now)} WIB`;
        estimasiHabisDisplay.value = getEstimasiHabisText();
      }

      function getTutorEmailBaru() {
        return `

📩 *Tutor Join Email Baru:*
Cek email undangan Google Family, lalu klik *Join/Accept*.
Jika tidak ada, buka: https://g.co/yourfamily

Setelah join, buka YouTube pakai email yang sama.`;
      }

      function getTutorPerpanjang() {
        return `

⚠️ *Tutor Perpanjang:*
Jangan keluar family sebelum ada instruksi admin.
Jika admin minta keluar, cek email Google bahwa family sudah tidak tersedia, lalu keluar dari grup lama.

Jika keluar sendiri tanpa arahan, garansi hangus dan email bisa kena limit Google 12 bulan.`;
      }

      function getTutorText() {
        const pakaiTutor = pakaiTutorInput.checked;
        const jenisTutor = jenisTutorInput.value;

        if (!pakaiTutor) {
          return '';
        }

        if (jenisTutor === 'baru') {
          return getTutorEmailBaru();
        }

        if (jenisTutor === 'perpanjang') {
          return getTutorPerpanjang();
        }

        return `${getTutorEmailBaru()}${getTutorPerpanjang()}`;
      }

      function generateNota() {
        updateTanggalDanOrder();

        const nomorOrder = nomorOrderInput.value.trim();
        const emailCustomer = emailCustomerInput.value.trim();
        const emailAdmin = emailAdminInput.value.trim();

        const tglInvite = formatTanggalLengkap(now);
        const jamInvite = formatJam(now);
        const estimasiHabisText = getEstimasiHabisText();
        const tutorText = getTutorText();

        return `*NOTA YOUTUBE PREMIUM FAMILY* 🎬

🧾 *Order:* ${nomorOrder}
📅 *Invite:* ${tglInvite}, ${jamInvite} WIB
📧 *Email:* ${emailCustomer}
👤 *Admin Invite:* ${emailAdmin}

📦 *Layanan:* YouTube Premium Family
⏳ *Durasi:* Estimasi 23-28 hari
📆 *Estimasi Habis:* ${estimasiHabisText}
💰 *Harga:* ${getHargaText()}${tutorText}

🎁 *Bonus:* Google One/Pro 100GB-5TB jika tersedia dan beruntung.

✅ Membeli berarti setuju dengan ketentuan layanan.
Terima kasih sudah order di *BabayShop* 🙏`.trim();
      }

      updateTanggalDanOrder();

      pakaiTutorInput.addEventListener('change', () => {
        tutorBox.classList.toggle('hidden', !pakaiTutorInput.checked);
      });

      hargaInput.addEventListener('change', updateTanggalDanOrder);

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        notaOutput.value = generateNota();
        notaOutput.readOnly = true;
        editButton.textContent = 'Edit Nota';
        outputSection.classList.remove('hidden');

        setTimeout(() => {
          outputSection.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }, 100);
      });

      copyButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(notaOutput.value);
          copyButton.textContent = 'Berhasil Disalin!';
        } catch (err) {
          notaOutput.select();
          document.execCommand('copy');
          copyButton.textContent = 'Berhasil Disalin!';
        }

        setTimeout(() => {
          copyButton.textContent = 'Salin Nota';
        }, 1800);
      });

      editButton.addEventListener('click', () => {
        notaOutput.readOnly = false;
        notaOutput.focus();
        editButton.textContent = 'Mode Edit Aktif';
      });
    });
  </script>
</body>
</html>
