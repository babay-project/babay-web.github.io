<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Plus Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --space-bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.05);
      --glass: rgba(255, 255, 255, 0.1);
      --accent: #7c4dff;
      --text: #e0e0e0;
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: var(--space-bg);
      background-attachment: fixed;
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 500px; }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 { font-size: 22px; margin: 0 0 20px 0; color: #fff; text-align: center; text-shadow: 0 0 10px rgba(124, 77, 255, 0.5); }

    .group { margin-bottom: 15px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #a5a5a5; margin-bottom: 6px; font-weight: 700; }

    input, select {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(124, 77, 255, 0.3); }

    textarea {
      width: 100%;
      height: 280px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 15px;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      resize: vertical;
      line-height: 1.6;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: var(--accent);
      color: white;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover { background: #651fff; box-shadow: 0 0 15px rgba(124, 77, 255, 0.5); }
    
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>🚀 GPT Plus Generator</h1>
      
      <div class="group">
        <label>Pilih Garansi</label>
        <select id="inGaransi" onchange="renderData()">
          <option value="0">No Garansi</option>
          <option value="7">Garansi 7 Hari</option>
          <option value="14">Garansi 14 Hari</option>
          <option value="25">Garansi 25 Hari Full</option>
        </select>
      </div>

      <div class="group">
        <label>Email Akun</label>
        <input type="text" id="inEmail" placeholder="user@mail.com" oninput="renderData()">
      </div>

      <div class="group">
        <label>Password</label>
        <input type="text" id="inPass" placeholder="••••••••" oninput="renderData()">
      </div>

      <div class="group">
        <label>Provider Akses OTP</label>
        <select id="inProvider" onchange="toggleCustom(); renderData();">
          <option value="emailqu.com">emailqu.com</option>
          <option value="generator.email">generator.email</option>
          <option value="custom">Input Sendiri (Custom)</option>
        </select>
      </div>

      <div class="group hidden" id="customProviderDiv">
        <label>Masukkan Domain/Web</label>
        <input type="text" id="inCustom" placeholder="contoh: webanda.com" oninput="renderData()">
      </div>

      <div class="group">
        <label>Tanggal Pembelian</label>
        <input type="date" id="inTgl" oninput="renderData()">
      </div>
    </div>

    <div class="card">
      <label>Nota Hasil (Bisa Diedit Manual)</label>
      <textarea id="output"></textarea>
      <button class="btn" onclick="copyText()">Salin Pesan</button>
    </div>
  </div>

  <script>
    function toggleCustom() {
      const provider = document.getElementById('inProvider').value;
      const customDiv = document.getElementById('customProviderDiv');
      if (provider === 'custom') {
        customDiv.classList.remove('hidden');
      } else {
        customDiv.classList.add('hidden');
      }
    }

    function formatTanggal(tanggal) {
      if (!tanggal) return '-';
      return new Date(tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function hitungGaransi(tanggal, durasi) {
      if (!tanggal || durasi <= 0) return 'No Garansi';
      const date = new Date(tanggal);
      date.setDate(date.getDate() + durasi);
      return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function renderData() {
      const email = document.getElementById('inEmail').value || '...';
      const pass = document.getElementById('inPass').value || '...';
      const tglBeli = document.getElementById('inTgl').value;
      const durasi = parseInt(document.getElementById('inGaransi').value, 10);
      const garansiLabel = document.getElementById('inGaransi').options[document.getElementById('inGaransi').selectedIndex].text;
      
      let provider = document.getElementById('inProvider').value;
      if (provider === 'custom') {
        provider = document.getElementById('inCustom').value || 'web-anda.com';
      }

      const tglFormatted = formatTanggal(tglBeli);
      const expFormatted = hitungGaransi(tglBeli, durasi);

      const text = `PESANAN CHATGPT PLUS BERHASIL\n` +
        `----------------------------------\n` +
        `Tgl Beli: ${tglFormatted}\n` +
        `Variasi: ${garansiLabel}\n` +
        `Garansi: ${expFormatted}\n` +
        `----------------------------------\n` +
        `Email: ${email}\n` +
        `Pass: ${pass}\n` +
        `Akses OTP: https://${provider}/${email}\n` +
        `----------------------------------\n` +
        `CARA LOGIN:\n` +
        `Jika meminta kode verifikasi, buka link akses OTP di atas.\n\n` +
        `INFO GARANSI:\n` +
        `Klaim garansi estimasi max 48 jam. Jangan ganti data profil atau billing agar garansi tetap aktif.`;

      document.getElementById('output').value = text;
    }

    function copyText() {
      const output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
      const btn = document.querySelector('.btn');
      btn.innerText = "Tersalin ke Clipboard!";
      setTimeout(() => { btn.innerText = "Salin Pesan"; }, 2000);
    }

    document.getElementById('inTgl').valueAsDate = new Date();
    renderData();
  </script>
</body>
</html>
