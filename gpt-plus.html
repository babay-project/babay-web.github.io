<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Plus Generator Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --space-bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.05);
      --glass: rgba(255, 255, 255, 0.1);
      --accent: #7c4dff;
      --text: #e0e0e0;
      --border: rgba(255, 255, 255, 0.15);
    }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: var(--space-bg);
      background-attachment: fixed;
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .container { width: 100%; max-width: 500px; }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { font-size: 22px; margin: 0 0 20px 0; color: #fff; text-align: center; text-shadow: 0 0 10px rgba(124, 77, 255, 0.5); }
    .group { margin-bottom: 15px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #a5a5a5; margin-bottom: 6px; font-weight: 700; }
    input, select, textarea.input-field {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      transition: 0.3s;
    }
    input:focus, select:focus, textarea.input-field:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(124, 77, 255, 0.3); }
    textarea.output-field {
      width: 100%;
      height: 480px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 15px;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      resize: vertical;
      line-height: 1.6;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: var(--accent);
      color: white;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn:hover { background: #651fff; box-shadow: 0 0 15px rgba(124, 77, 255, 0.5); }
    .hidden { display: none; }
    .row { display: flex; gap: 10px; }
    .row .group { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🚀 GPT Plus Generator</h1>
            
      <div class="group">
        <label>Tanggal Pembelian</label>
        <input type="date" id="inTgl" oninput="renderData()">
      </div>

      <div class="row">
        <div class="group">
          <label>Durasi Paket</label>
          <select id="inDurasiSelect" onchange="toggleDurasiCustom(); renderData();">
            <option value="30">1 Bulan (30 Hari)</option>
            <option value="90">3 Bulan (90 Hari)</option>
            <option value="custom">Custom (Hari)</option>
          </select>
        </div>
        <div class="group">
          <label>Tipe Garansi</label>
          <select id="inGaransiType" onchange="toggleGaransiUI(); renderData();">
            <option value="login">Garansi Login (1x24 JAM)</option>
            <option value="hari">Garansi Hari</option>
          </select>
        </div>
      </div>

      <!-- UI Input Dinamis -->
      <div class="group hidden" id="customDurasiDiv">
        <label>Masukkan Durasi Custom (Hari)</label>
        <input type="number" id="inDurasiCustomVal" value="30" oninput="renderData()">
      </div>

      <div class="group hidden" id="garansiHariDiv">
        <label>Berapa Hari Garansi?</label>
        <input type="number" id="inGaransiDay" value="30" oninput="renderData()">
      </div>

      <div class="group">
        <label>Email Akun</label>
        <input type="text" id="inEmail" placeholder="user@mail.com" oninput="renderData()">
      </div>

      <div class="group">
        <label>Password</label>
        <input type="text" id="inPass" placeholder="••••••••" oninput="renderData()">
      </div>

      <div class="group">
        <label>Secret Key 2FA</label>
        <input type="text" id="inSecret2FA" placeholder="Contoh: UVCJA477H45IL3F7..." oninput="renderData()">
      </div>

      <div class="group">
        <label>Deskripsi Tambahan (Opsional)</label>
        <textarea id="inNote" class="input-field" style="height: 60px;" placeholder="Contoh: Bonus Shared Akun" oninput="renderData()"></textarea>
      </div>
    </div>

    <div class="card">
      <label>Nota Hasil (Bisa Diedit Manual)</label>
      <textarea id="output" class="output-field"></textarea>
      <button class="btn" onclick="copyText()">Salin Pesan</button>
    </div>
  </div>

  <script>
    function toggleDurasiCustom() {
      const durasiType = document.getElementById('inDurasiSelect').value;
      document.getElementById('customDurasiDiv').classList.toggle('hidden', durasiType !== 'custom');
    }

    function toggleGaransiUI() {
      const gType = document.getElementById('inGaransiType').value;
      document.getElementById('garansiHariDiv').classList.toggle('hidden', gType !== 'hari');
    }

    function formatTanggal(tanggal) {
      if (!tanggal) return '-';
      return new Date(tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function hitungTanggal(tanggal, durasi) {
      if (!tanggal || durasi <= 0) return 'Tdk Ada';
      const date = new Date(tanggal);
      date.setDate(date.getDate() + parseInt(durasi));
      return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function renderData() {
      const email = document.getElementById('inEmail').value || '...';
      const pass = document.getElementById('inPass').value || '...';
      const secret2fa = document.getElementById('inSecret2FA').value.trim() || '...';
      const tglBeli = document.getElementById('inTgl').value;
            
      // Durasi Paket
      const durasiSelect = document.getElementById('inDurasiSelect').value;
      let durasiPaket = (durasiSelect === 'custom') ? document.getElementById('inDurasiCustomVal').value : durasiSelect;
      let labelDurasiTeks = (durasiSelect === '30') ? "1 Bulan" : (durasiSelect === '90' ? "3 Bulan" : durasiPaket + " Hari");

      // Garansi
      const garansiType = document.getElementById('inGaransiType').value;
      let garansiTeks = "";
      let garansiNote = "Sesuai Deskripsi Garansi 1*24 JAM.";

      if (garansiType === 'login') {
        garansiTeks = "Garansi Login 1*24 JAM";
      } else {
        const gDay = document.getElementById('inGaransiDay').value || 0;
        const expG = hitungTanggal(tglBeli, gDay);
        garansiTeks = `${gDay} Hari (s/d ${expG})`;
        garansiNote = `Sesuai Deskripsi Garansi Full ${gDay} Hari.`;
      }            

      const tglFormatted = formatTanggal(tglBeli);
      const extraNote = document.getElementById('inNote').value;

      // Generate Link 2FA otomatis menggunakan query string ?key=
      let web2faLink = secret2fa !== '...' ? `https://babay.web.id/2fa/?key=${secret2fa}` : `https://babay.web.id/2fa/`;

      let text = `PESANAN CHATGPT PLUS BERHASIL\n` +
        `----------------------------------\n` +
        `Tgl Beli: ${tglFormatted}\n` +
        `Durasi  : ${labelDurasiTeks}\n` +
        `Garansi : ${garansiTeks}\n` +
        `----------------------------------\n` +
        `Email   : ${email}\n` +
        `Password: ${pass}\n` +
        `SecretKey: ${secret2fa}\n` +
        `----------------------------------\n\n` +
        `S&K Akses Kode 2FA:\n` +
        `1. Buka website berikut untuk mengambil OTP:\n` +
        `   ${web2faLink}\n` +
        `2. Kode SecretKey 2FA Anda sudah otomatis terisi jika menggunakan link di atas.\n` +
        `3. Contoh jika ingin memasukkan manual, buka webnya lalu tempel kodenya.\n` +
        `4. Setelah kode dimasukkan, web akan menampilkan kode (OTP) yg dapat digunakan untuk login.\n` +
        `5. Kode OTP bersifat sementara dan akan berubah secara berkala.\n` +
        `6. Jaga kerahasiaan kode 2FA untuk menghindari penyalahgunaan akses akunnya.\n\n` +
        `Cara Akses CHAT GPT:\n` +
        `• LOGIN DENGAN EMAIL DAN PASSWORD DULU\n` +
        `• MAKSIMAL 2 DEVICE SAJA\n` +
        `• SILAHKAN GANTI PASSWORD DI PENGATURAN\n` +
        `• JANGAN PAKAI 9ROUTER KALAU BISA APALAGI CODEX SECARA BERLEBIHAN\n\n` +
        `INFO KLAIM GARANSI:\n` +
        `${garansiNote}\n` +
        `Dilarang keras mengubah Profile/Billing/Plan agar garansi tetap aktif.`;

      if (extraNote.trim() !== "") {
        text += `\n\nCATATAN TAMBAHAN:\n${extraNote}`;
      }

      document.getElementById('output').value = text;
    }

    function copyText() {
      const output = document.getElementById("output");
      output.select();
      document.execCommand("copy");
      const btn = document.querySelector('.btn');
      btn.innerText = "✅ Tersalin!";
      setTimeout(() => { btn.innerText = "Salin Pesan"; }, 2000);
    }

    document.getElementById('inTgl').valueAsDate = new Date();
    renderData();
  </script>
</body>
</html>
