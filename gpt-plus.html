<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Plus Generator Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --space-bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      --card-bg: rgba(255, 255, 255, 0.05);
      --accent: #7c4dff;
      --text: #e0e0e0;
      --border: rgba(255, 255, 255, 0.15);
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--space-bg);
      background-attachment: fixed;
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 20px 0;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 10px rgba(124, 77, 255, 0.5);
    }

    .group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a5a5a5;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input,
    select,
    textarea.input-field {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus,
    select:focus,
    textarea.input-field:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 10px rgba(124, 77, 255, 0.3);
    }

    textarea.output-field {
      width: 100%;
      height: 620px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 15px;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      resize: vertical;
      line-height: 1.6;
    }

    textarea.output-field[readonly] {
      opacity: 0.92;
      cursor: default;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: var(--accent);
      color: white;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      background: #651fff;
      box-shadow: 0 0 15px rgba(124, 77, 255, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .hidden {
      display: none;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .group {
      flex: 1;
    }

    .action-row {
      display: flex;
      gap: 10px;
    }

    .action-row .btn {
      flex: 1;
    }

    .info-mini {
      font-size: 12px;
      line-height: 1.5;
      color: #bdbdbd;
      margin-top: 10px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .row,
      .action-row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <h1>🚀 GPT Plus Generator</h1>

      <div class="group">
        <label>Tanggal Pembelian</label>
        <input type="date" id="inTgl">
      </div>

      <div class="row">
        <div class="group">
          <label>Durasi Paket</label>
          <select id="inDurasiSelect" onchange="toggleDurasiCustom();">
            <option value="30">1 Bulan (30 Hari)</option>
            <option value="90">3 Bulan (90 Hari)</option>
            <option value="custom">Custom (Hari)</option>
          </select>
        </div>

        <div class="group">
          <label>Tipe Garansi</label>
          <select id="inGaransiType" onchange="toggleGaransiUI();">
            <option value="login">Garansi Login (1x24 JAM)</option>
            <option value="hari">Garansi Hari</option>
          </select>
        </div>
      </div>

      <div class="group hidden" id="customDurasiDiv">
        <label>Masukkan Durasi Custom (Hari)</label>
        <input type="number" id="inDurasiCustomVal" value="30">
      </div>

      <div class="group hidden" id="garansiHariDiv">
        <label>Berapa Hari Garansi?</label>
        <input type="number" id="inGaransiDay" value="30">
      </div>

      <div class="group">
        <label>Email Akun</label>
        <input type="text" id="inEmail" placeholder="user@mail.com">
      </div>

      <div class="group">
        <label>Password</label>
        <input type="text" id="inPass" placeholder="••••••••">
      </div>

      <div class="group">
        <label>Secret Key 2FA</label>
        <input type="text" id="inSecret2FA" placeholder="Contoh: UVCJA477H45IL3F7...">
      </div>

      <div class="group">
        <label>Deskripsi Tambahan (Opsional)</label>
        <textarea id="inNote" class="input-field" style="height: 60px;" placeholder="Contoh: Bonus Shared Akun"></textarea>
      </div>

      <button class="btn" onclick="generateNota()">Generate Nota</button>
      <div class="info-mini">Nota tidak akan tampil sebelum tombol Generate Nota diklik.</div>
    </div>

    <div class="card hidden" id="resultCard">
      <label>Nota Hasil</label>
      <textarea id="output" class="output-field" readonly></textarea>

      <div class="action-row">
        <button class="btn" id="copyBtn" onclick="copyText()">Salin Pesan</button>
        <button class="btn btn-secondary" id="editBtn" onclick="toggleEdit()">Edit Nota</button>
      </div>
    </div>

  </div>

  <script>
    let isEditMode = false;

    function toggleDurasiCustom() {
      const durasiType = document.getElementById('inDurasiSelect').value;
      document.getElementById('customDurasiDiv').classList.toggle('hidden', durasiType !== 'custom');
    }

    function toggleGaransiUI() {
      const gType = document.getElementById('inGaransiType').value;
      document.getElementById('garansiHariDiv').classList.toggle('hidden', gType !== 'hari');
    }

    function formatTanggal(tanggal) {
      if (!tanggal) return '-';

      return new Date(tanggal).toLocaleDateString('id-ID', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      });
    }

    function hitungTanggal(tanggal, durasi) {
      if (!tanggal || durasi <= 0) return 'Tdk Ada';

      const date = new Date(tanggal);
      date.setDate(date.getDate() + parseInt(durasi));

      return date.toLocaleDateString('id-ID', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      });
    }

    function generateNota() {
      const email = document.getElementById('inEmail').value || '...';
      const pass = document.getElementById('inPass').value || '...';
      const secret2fa = document.getElementById('inSecret2FA').value.trim() || '...';
      const tglBeli = document.getElementById('inTgl').value;

      const durasiSelect = document.getElementById('inDurasiSelect').value;
      let durasiPaket = durasiSelect === 'custom'
        ? document.getElementById('inDurasiCustomVal').value
        : durasiSelect;

      let labelDurasiTeks = durasiSelect === '30'
        ? '1 Bulan'
        : durasiSelect === '90'
          ? '3 Bulan'
          : durasiPaket + ' Hari';

      const garansiType = document.getElementById('inGaransiType').value;
      let garansiTeks = '';
      let garansiNote = 'Sesuai deskripsi garansi login 1x24 jam.';

      if (garansiType === 'login') {
        garansiTeks = 'Garansi Login 1x24 Jam';
      } else {
        const gDay = document.getElementById('inGaransiDay').value || 0;
        const expG = hitungTanggal(tglBeli, gDay);
        garansiTeks = `${gDay} Hari (s/d ${expG})`;
        garansiNote = `Sesuai deskripsi garansi full ${gDay} hari.`;
      }

      const tglFormatted = formatTanggal(tglBeli);
      const extraNote = document.getElementById('inNote').value.trim();

      let web2faLink = secret2fa !== '...'
        ? `https://babay.web.id/2fa/?key=${encodeURIComponent(secret2fa)}`
        : `https://babay.web.id/2fa/`;

      let text =
`PESANAN CHATGPT PLUS BERHASIL
----------------------------------
Tgl Beli: ${tglFormatted}
Durasi  : ${labelDurasiTeks}
Garansi : ${garansiTeks}
----------------------------------
Email   : ${email}
Password: ${pass}
Link MFA: ${web2faLink}
----------------------------------

⚠️ CARA LOGIN DAN CEK PAKET:

1. Login terlebih dahulu menggunakan Email dan Password yang sudah diberikan.
2. Jika saat login diminta kode verifikasi / OTP, ambil kode MFA melalui link diatas.
3. Setelah berhasil masuk, silakan cek bagian pengaturan akun / penagihan terlebih dahulu untuk memastikan plan sudah aktif sebagai ChatGPT Plus / Pro sesuai paket yang dibeli.
4. Jika plan sudah aktif, akun sudah bisa digunakan seperti biasa.
----------------------------------

⚠️ ATURAN PENGGUNAAN AKUN:
• Gunakan akun secara wajar dan normal.
• Jangan spam penggunaan fitur secara berlebihan dalam waktu dekat.
• Untuk penggunaan aplikasi Codex, biasanya bisa diminta verifikasi nomor HP / WhatsApp. Silakan gunakan nomor kalian sendiri. Hal ini di luar kuasa kami karena mengikuti kebijakan OpenAI.
• Penggunaan Codex juga sewajarnya. Jangan dipakai sampai limit habis terus-menerus atau dipaksa berlebihan setiap hari.
• Saran penggunaan maksimal 3 device / perangkat saja (Dengan Penggunakan secara berkala).
• Dilarang mengubah Profile, Password, Billing, atau Plan akun agar tidak memicu verifikasi ulang.
• Jangan menggunakan cookies / token secara berlebihan, termasuk untuk pecut AI atau tools sejenis.
• Jangan gunakan proxy, router, atau jaringan yang dilarang oleh sistem Official OpenAI. Contoh: 9router dan sejenisnya.
• Jangan menggunakan akun untuk tools pihak ketiga yang mengambil API, cookies, token, atau akses tidak resmi lainnya.
----------------------------------

🛡️ KETENTUAN GARANSI:
• ${garansiNote}(lebih dari itu, akun sepenuhnya di handle oleh pembeli)
• Metode pembayaran menggunakan method payment yang sah berdasarkan region akun.
• OpenAI memiliki sistem keamanan yang ketat. Jadi gunakan akun sewajarnya agar akun tetap aman dan tidak terdeteksi aktivitas mencurigakan.
• Garansi dari kami lebih mengarah ke kendala paket, seperti paket hilang, plan kembali ke Free, atau masalah paket yang bukan disebabkan oleh kesalahan pengguna.
• Garansi Hangus apabila akun terdeteksi melakukan  penggunaan secara berlebihan, spam, dipakai banyak perangkat, dibagikan ke orang lain, menggunakan cookies/token, API/tools pihak ketiga, proxy/router terlarang, atau mengubah pengaturan.
• Jika akun terkena deactivated, banned, terkunci, atau bermasalah karena terdapat unsur kesalahan pengguna, maka hal tersebut berada di luar tanggung jawab kami sebagai penyedia. 
• Dengan membeli dan menggunakan akun ini, pembeli berarti sudah membaca, memahami, dan menyetujui aturan penggunaan serta ketentuannya.
Terimakasih...
----------------------------------`;

      if (extraNote !== '') {
        text += `

CATATAN TAMBAHAN:
${extraNote}`;
      }

      const output = document.getElementById('output');
      const resultCard = document.getElementById('resultCard');
      const editBtn = document.getElementById('editBtn');

      output.value = text;
      output.setAttribute('readonly', true);
      resultCard.classList.remove('hidden');

      isEditMode = false;
      editBtn.innerText = 'Edit Nota';

      resultCard.scrollIntoView({
        behavior: 'smooth',
        block: 'start'
      });
    }

    function toggleEdit() {
      const output = document.getElementById('output');
      const editBtn = document.getElementById('editBtn');

      isEditMode = !isEditMode;

      if (isEditMode) {
        output.removeAttribute('readonly');
        output.focus();
        editBtn.innerText = 'Selesai Edit';
      } else {
        output.setAttribute('readonly', true);
        editBtn.innerText = 'Edit Nota';
      }
    }

    function copyText() {
      const output = document.getElementById('output');
      const btn = document.getElementById('copyBtn');

      output.select();
      output.setSelectionRange(0, 99999);

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(output.value);
      } else {
        document.execCommand('copy');
      }

      btn.innerText = '✅ Tersalin!';

      setTimeout(() => {
        btn.innerText = 'Salin Pesan';
      }, 2000);
    }

    document.getElementById('inTgl').valueAsDate = new Date();
  </script>
</body>
</html>
