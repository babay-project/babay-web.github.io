<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Payment Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .search-dropdown-list { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 4px; z-index: 50; }
        .search-dropdown-list.open { display: block; }
        .search-dropdown-item { padding: 0.5rem; cursor: pointer; border-radius: 0.5rem; }
        .search-dropdown-item:hover { background: #334155; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Checkout Generator</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                <p class="text-gray-400 text-xs uppercase">Total Generated</p>
                <p class="text-3xl font-extrabold" id="stat-total">0</p>
            </div>
            </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-purple-900">
            <div class="mb-4">
                <label class="block text-sm mb-2">Auth Session</label>
                <textarea id="accessToken" rows="5" placeholder="Paste your accessToken..." class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none"></textarea>
            </div>
            
            <button id="generateBtn" onclick="generatePaymentLink()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-semibold transition">
                Generate Link
            </button>
            <div id="loadingState" class="hidden text-center py-4 text-purple-400">Loading...</div>
            <div id="resultBox" class="hidden mt-4 p-4 bg-green-900/20 border border-green-500/50 rounded-xl">
                <input type="text" id="resultUrl" readonly class="w-full bg-transparent text-sm text-green-400 border-none outline-none">
            </div>
            <div id="errorBox" class="hidden mt-4 p-4 bg-red-900/20 border border-red-500/50 rounded-xl text-red-400 text-sm"></div>
        </div>
    </div>

    <script>
        let selectedPlan = 'team';

        async function generatePaymentLink() {
            const tokenRaw = document.getElementById('accessToken').value.trim();
            if (!tokenRaw) { alert('Isi token!'); return; }

            setLoading(true);
            
            try {
                // MENGARAH LANGSUNG KE API PETRIX
                const res = await fetch('http://ezweystock.petrix.id/gpt/payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        plan: selectedPlan,
                        payment: 'shortlink',
                        currency: 'IDR',
                        session: tokenRaw
                    })
                });

                const data = await res.json();
                setLoading(false);

                if (data.success) {
                    document.getElementById('resultBox').classList.remove('hidden');
                    document.getElementById('resultUrl').value = data.url;
                } else {
                    showError(data.msg || 'Gagal generate');
                }
            } catch (err) {
                setLoading(false);
                showError('Error: ' + err.message + '. (Cek Konsol Browser)');
            }
        }

        function setLoading(on) {
            document.getElementById('generateBtn').classList.toggle('hidden', on);
            document.getElementById('loadingState').classList.toggle('hidden', !on);
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>
