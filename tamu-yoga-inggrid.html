


<!DOCTYPE html>
<html lang="id" data-dc="" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Daftar Tamu &amp; Kirim Undangan Ngunduh Mantu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&amp;display=swap" rel="stylesheet" />
    <style>
      /* CSS Tetap Sama Seperti Sebelumnya */
      :root{
        --dc-bg:#313338; --dc-bg-soft:#2b2d31; --dc-surface:#1e1f22; --dc-text:#f2f3f5; --dc-muted:#b5bac1; --dc-stroke:#3f4247; --dc-line:#3a3d42; --dc-primary:#5865f2; --dc-primary-2:#4752c4;
        --dcL-bg:#f2f3f5; --dcL-bg-soft:#ffffff; --dcL-surface:#ffffff; --dcL-text:#060607; --dcL-muted:#6b7280; --dcL-stroke:#e5e7eb; --dcL-line:#eceff3; --dcL-primary:#5865f2; --dcL-primary-2:#4752c4;
      }
      *{box-sizing:border-box}
      html[data-dc] body{ margin:0; background:var(--dcL-bg); color:var(--dcL-text); font-family:Poppins,sans-serif; -webkit-font-smoothing:antialiased; }
      .wrap{max-width:960px;margin:0 auto;padding:20px 14px 84px}
      .header{display:flex;flex-direction:column;gap:8px;margin:36px 0 12px; text-align:center;}
      .header h1{margin:0;font:800 22px/1.25 Poppins;letter-spacing:.2px}
      .header p{margin:0;color:var(--dcL-muted);font-weight:500}
      .card{ background:var(--dcL-bg-soft); border:1px solid var(--dcL-stroke); border-radius:16px; padding:16px; box-shadow:0 12px 28px rgba(0,0,0,.06) }
      .section-title{margin:6px 0 12px;font:800 16px/1.2 Poppins}
      .hr{height:1px;background:var(--dcL-line);margin:14px 0}
      .grid{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr))}
      @media(max-width:768px){ .grid{grid-template-columns:1fr} }
      .row{display:flex;flex-direction:column;gap:8px}
      label{font:600 12.5px/1.2 Poppins;color:var(--dcL-muted)}
      .req::after{content:" *";color:#ef4444;font-weight:800}
      input,textarea,select{ width:100%;padding:12px;border:1px solid var(--dcL-stroke); border-radius:12px;background:var(--dcL-surface);color:var(--dcL-text); font:400 14px Poppins; outline:0; }
      .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
      .btn{ display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer; border-radius:12px;border:1px solid var(--dcL-stroke);padding:12px 14px; font:800 13.5px Poppins; background:#fff; color:var(--dcL-text); transition: all .15s; }
      .btn-primary{ background:var(--dcL-primary)!important; color:#fff!important; }
      .btn-danger{ background:#ef4444!important; color:#fff!important; }
      .btn-whatsapp{ background:#25d366!important; color:#fff!important; }
      .item{border:1px solid var(--dcL-stroke);border-radius:14px;overflow:hidden;background:var(--dcL-bg-soft); margin-bottom:12px;}
      .item-head{display:flex;justify-content:space-between;padding:12px;background:#f7f7fb;border-bottom:1px solid var(--dcL-stroke)}
      .item-body{padding:12px}
      .modal{ position:fixed; inset:0; display:none; place-items:center; z-index:70; background:rgba(0,0,0,.35); backdrop-filter:blur(2px); }
      .modal.show{display:grid;}
      .modal-card{ width:min(560px,92vw); background:#fff; border-radius:14px; padding:16px; }
      .theme-switch{ position:fixed; bottom:16px; right:12px; z-index:80; background:#fff; border-radius:999px; padding:8px; border:1px solid #ddd; }
      html[data-dc]:not(.light) body{ background:var(--dc-bg); color:var(--dc-text) }
      html[data-dc]:not(.light) .card{ background:var(--dc-bg-soft); border-color:var(--dc-stroke) }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="theme-switch">
        <button id="themeToggle" style="border:0; background:none; cursor:pointer; font-weight:800;">
          <span id="themeIcon">🌙</span> <span id="themeLabel">Dark Mode</span>
        </button>
      </div>

      <header class="header">
        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEhhJrYv5OzuQ6bPTyBcgu_1MpmoPAgyLf__EGK5YGZQmQnOSVFxaY0xrWCdfmKX2bzsnyqNmKQF7Js0BJhf92K8wtYcB_voF6zJi25jlXGIkh81KylJV7K9N4S5a9ySywGhOqOtAtGI0yUw5wxztMUUswTrj9_vy0HI66n5H6KieOItjPXMIPFbJOrtmPnY" alt="Logo" style="max-width:140px; margin:0 auto; display:block;" />
        <h1>Kirim Undangan Ngunduh Mantu</h1>
        <p>Gunakan form ini untuk mempermudah kirim undangan via WhatsApp.</p>
      </header>

      <section class="card">
        <div class="section-title">1) Data Undangan</div>
        <div class="row">
          <label class="req">Slug Undangan</label>
          <input id="slug" placeholder="contoh: yoga-inggrid" value="yoga-inggrid" />
        </div>

        <div class="hr"></div>

        <div class="section-title">2) Tambah Tamu</div>
        <div class="row">
          <label class="req">Nama Penerima (Satu per baris)</label>
          <textarea id="namaTamu" placeholder="Inggrid Nadya&#10;Mas Udin"></textarea>
        </div>
        <div class="actions">
          <button id="addBtn" class="btn btn-primary">Tambah ke Daftar</button>
          <button id="clearBtn" class="btn btn-danger">Bersihkan</button>
        </div>

        <div class="hr"></div>
        <div class="section-title">3) Daftar &amp; Kirim</div>
        <div id="list"></div>
      </section>
    </main>

    <div id="modal" class="modal">
      <div class="modal-card">
        <h3 id="modalTitle">Berhasil</h3>
        <p id="modalDesc"></p>
        <button id="modalOk" class="btn btn-primary">OK</button>
      </div>
    </div>

    <script>
      (function(){
        const $ = (s)=>document.querySelector(s);
        const rootEl = document.documentElement;

        // Theme Toggle
        const themeToggle = $('#themeToggle');
        function applyTheme(mode){
          const isLight = mode === 'light';
          rootEl.classList.toggle('light', isLight);
          $('#themeIcon').textContent = isLight ? '🌙' : '🌞';
          $('#themeLabel').textContent = isLight ? 'Dark Mode' : 'Light Mode';
          localStorage.setItem('dcTheme', mode);
        }
        themeToggle.addEventListener('click', () => applyTheme(rootEl.classList.contains('light') ? 'dark' : 'light'));

        // Elements
        const listEl = $('#list'), slugEl = $('#slug'), namaTamuEl = $('#namaTamu');
        const state = { items: [] };
        const BASE_URL = "https://undangannya.web.id/";

        // Format Nama dari Slug
        const titleFromSlug = (slug) => {
          if(!slug) return 'Yoga & Inggrid';
          return slug.split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' & ');
        };

        // RENDER LIST
        function render(){
          listEl.innerHTML = '';
          const slug = slugEl.value || 'yoga-inggrid';
          const couple = titleFromSlug(slug);

          state.items.forEach((nama, idx) => {
            const link = `${BASE_URL}${slug}/?to=${encodeURIComponent(nama).replace(/%20/g,'+')}`;
            
            // FORMAT PESAN SESUAI PERMINTAAN
            const message = [
              "Dear,",
              `*${nama}*`,
              "",
              "Tanpa mengurangi rasa hormat, perkenankan kami berbagi kebahagiaan dalam acara syukuran Ngunduh Mantu kami.",
              "",
              "Berikut link undangan kami untuk info lengkap dari acara dapat kunjungi:",
              "",
              link,
              "",
              "Kehadiran teman-teman semua sangat berarti buat kami. Sampai jumpa di sana!",
              "",
              "Salam hangat,",
              couple
            ].join("\n");

            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `
              <div class="item-head"><span class="item-title">${nama}</span></div>
              <div class="item-body">
                <textarea readonly style="font-size:12px; height:80px; margin-bottom:8px;">${message}</textarea>
                <div class="actions">
                  <button class="btn btn-whatsapp" onclick="window.open('https://wa.me/?text=${encodeURIComponent(message)}', '_blank')">Kirim WA</button>
                  <button class="btn btn-copy" data-msg="${encodeURIComponent(message)}">Salin</button>
                </div>
              </div>
            `;
            listEl.appendChild(item);
          });
        }

        // Action Buttons
        $('#addBtn').addEventListener('click', () => {
          const lines = namaTamuEl.value.split('\n').map(l => l.trim()).filter(l => l !== '');
          if(lines.length === 0) return alert('Isi nama tamu dulu!');
          state.items = [...new Set([...state.items, ...lines])];
          namaTamuEl.value = '';
          render();
        });

        $('#clearBtn').addEventListener('click', () => {
          state.items = [];
          render();
        });

        document.addEventListener('click', async (e) => {
          if(e.target.classList.contains('btn-copy')){
            const msg = decodeURIComponent(e.target.getAttribute('data-msg'));
            await navigator.clipboard.writeText(msg);
            alert('Pesan berhasil disalin!');
          }
        });

        // Init
        const saved = localStorage.getItem('dcTheme');
        applyTheme(saved === 'dark' ? 'dark' : 'light');
      })();
    </script>
  </body>
</html>
